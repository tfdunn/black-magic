<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Black Magic</title>

  <!-- PWA / installable -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#ffffff">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Black Magic">
  <link rel="apple-touch-icon" href="icon-180.png">
  <style>
    /* ── Design tokens (from Claude Design handoff) ── */
    :root {
      --ink:       #0B0B0C;              /* primary text, ticks, save bg, borders */
      --secondary: rgba(60,60,67,0.60);  /* labels, date, selector, timer m:ss */
      --tertiary:  rgba(60,60,67,0.34);  /* units, placeholders, chevron */
      --hairline:  rgba(60,60,67,0.13);  /* separators / grid gaps */
      --accent:    #9A5A2B;              /* warm roasted amber — the one accent */
      --font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro',
              'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    /* Lock the screen — no page scroll / rubber-band on iPhone (content fits 100dvh) */
    html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }
    body {
      font-family: var(--font);
      background: #ececef;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      position: fixed;
      inset: 0;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* Stay portrait regardless of device rotation. The manifest requests portrait
       for the installed PWA; this counter-rotates the app if iOS rotates anyway
       (e.g. in a Safari tab). Only fires on a landscape phone (coarse pointer). */
    @media (orientation: landscape) and (pointer: coarse) and (max-height: 600px) {
      body {
        width: 100vh; height: 100vw;
        transform: rotate(-90deg);
        transform-origin: top left;
        /* rotate(-90) about top-left swings the box above the viewport;
           translate it back down by one viewport height (top:100vh). */
        inset: auto; top: 100vh; left: 0;
      }
      /* The rotated stage is 100vw tall (the phone's long side); make the app
         fill it instead of the short-side 100dvh, or it leaves a white gap. */
      .app { min-height: 100vw; }
    }

    .app {
      background: #fff;
      width: 100%;
      max-width: 440px;
      min-height: 100dvh;
      padding: max(12px, env(safe-area-inset-top)) 20px max(14px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 0;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
    }

    /* ── Header ── */
    .header {
      text-align: center;
      padding: 2px 0 10px;
    }

    .header h1 {
      font-size: 23px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--ink);
      line-height: 1.1;
    }

    .header .date {
      font-size: 12.5px;
      color: var(--secondary);
      margin-top: 4px;
      letter-spacing: 0.1px;
    }

    .brew-name {
      font-size: 15px;
      font-weight: 500;
      color: #000;
      text-align: center;
      padding: 10px 0 8px;
      border-bottom: 1px solid var(--hairline);
    }

    /* ── Stats Grid ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5px;                       /* gaps render as hairline separators */
      background: var(--hairline);
      border-bottom: 0.5px solid var(--hairline);
    }

    .stats-grid .stat-cell {
      background: #fff;
      padding: 13px 6px 14px;
      text-align: center;
    }

    .stat-cell .label {
      font-size: 10px;
      font-weight: 600;
      color: var(--secondary);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      display: block;
      margin-bottom: 5px;
      white-space: nowrap;   /* keep every metric label on one line */
    }

    .stat-cell .value {
      font-size: 21px;
      font-weight: 600;
      color: var(--ink);
      display: block;
      line-height: 1;
      letter-spacing: -0.4px;
    }

    /* ── Editable stat inputs ── */
    .value-input {
      font-size: 21px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.4px;
      background: transparent;
      border: none;
      border-bottom: 1px solid transparent;
      text-align: center;
      text-align-last: center; /* keeps <select> text centred */
      width: 100%;
      padding: 0;
      line-height: 1;
      font-family: inherit;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      display: block;
    }

    .value-input:focus {
      outline: none;
      border-bottom-color: var(--accent);
    }

    /* Hide number spinners */
    .value-input[type=number]::-webkit-inner-spin-button,
    .value-input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    .value-input[type=number] { -moz-appearance: textfield; }

    /* Cells with a unit suffix (%, ml) */
    .unit-wrap {
      display: flex;
      align-items: baseline;
      justify-content: center;
    }

    .unit-wrap .value-input {
      width: 3ch;
    }

    .unit-wrap .value-input.wide {
      width: 4ch;   /* brew target can be 4 digits */
    }

    .unit-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--tertiary);
      line-height: 1.1;
      margin-left: 2px;
    }

    /* Agitate: a little extra gap between the number and its word */
    #agitate-word { margin-left: 5px; }

    /* Agitate: bold number + small grey word, backed by a transparent native
       <select> so the iOS picker still works. */
    .select-wrap { position: relative; }
    .select-wrap .value {
      font-size: 21px; font-weight: 600; color: var(--ink);
      letter-spacing: -0.4px; line-height: 1;
    }
    .select-overlay {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      opacity: 0; border: none; background: none;
      font-family: inherit; font-size: 16px; cursor: pointer;
      -webkit-appearance: none; appearance: none;
    }

    /* ── Timer Area ── */
    .timer-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 0 2px;
    }

    .timer-circle-wrap {
      position: relative;
      width: 235px;
      height: 235px;
      margin: 0 auto 2px;
      cursor: pointer;           /* hold 2s to reset (no tap action) */
      -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
    }
    .timer-circle-wrap:active { opacity: 0.92; }

    .timer-circle-wrap svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* Clock strokes — progress arc is dark grey for the first 4 min, black past
       it (colour set per-frame in render()); the sweep hand is amber. */
    #timer-svg .t-track { stroke: rgba(60,60,67,0.10); }
    #timer-svg #t-arc   { stroke: #555; transition: stroke-dashoffset 0.1s linear, stroke 0.25s linear; }
    #timer-svg #t-hand  { stroke: var(--accent); }

    .timer-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .pour-number {
      font-size: 54px;
      font-weight: 700;
      color: var(--ink);
      line-height: 0.9;
      letter-spacing: -2px;
      font-variant-numeric: tabular-nums;
    }

    /* In-dial live timer (grey, above the pour number) */
    .dial-timer {
      font-size: 15px; font-weight: 500; color: var(--secondary);
      letter-spacing: 0.5px; margin-bottom: 4px; font-variant-numeric: tabular-nums;
    }
    /* Grey reset-hint symbol below the pour number (hold the dial 2s to reset) */
    .dial-reset { color: var(--tertiary); margin-top: 11px; line-height: 0; display: flex; }
    .dial-reset svg { width: 17px; height: 17px; display: block; }

    /* Hold-to-reset overlay on the dial (2-second press) */
    .dial-hold {
      position: absolute; inset: 0; border-radius: 50%;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; background: rgba(255,255,255,0.84); pointer-events: none;
    }
    .timer-circle-wrap.holding .dial-hold { display: flex; }
    .dial-hold .dh-label {
      font-size: 12px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--secondary);
    }
    .dial-hold .dh-bar {
      width: 96px; height: 4px; border-radius: 2px; background: var(--hairline);
      position: relative; overflow: hidden;
    }
    .dial-hold .dh-bar::after {
      content: ''; position: absolute; inset: 0; background: var(--accent);
      transform: scaleX(0); transform-origin: left;
    }
    .timer-circle-wrap.holding .dial-hold .dh-bar::after {
      transform: scaleX(1); transition: transform 2s linear;
    }
    /* Hold-to-save fill on the brew button (2-second press) */
    .btn-save .btn-fill {
      position: absolute; left: 0; top: 0; bottom: 0; width: 100%;
      background: var(--accent); transform: scaleX(0); transform-origin: left; z-index: 0;
    }
    .btn-save.holding .btn-fill { transform: scaleX(1); transition: transform 2s linear; }
    .btn-save .btn-label { position: relative; z-index: 1; }

    /* ── Bottom Stats Row ── */
    .bottom-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5px;
      background: var(--hairline);
      border-top: 0.5px solid var(--hairline);
      border-bottom: 0.5px solid var(--hairline);
      margin-top: 6px;
    }

    .bottom-stat {
      background: #fff;
      text-align: center;
      padding: 13px 6px 14px;
    }

    .bottom-stat .label {
      font-size: 10px;
      font-weight: 600;
      color: var(--secondary);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      display: block;
      margin-bottom: 5px;
    }

    .bottom-stat .value {
      font-size: 21px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.4px;
      display: block;
    }

    /* ── Tap-to-edit field buttons (recipe + results) ── */
    .field {
      -webkit-appearance: none; appearance: none; background: none; border: none;
      font-family: inherit; padding: 0; cursor: pointer; width: 100%;
      display: flex; align-items: baseline; justify-content: center; gap: 2px;
    }
    .field:active { opacity: 0.5; }
    .field .fnum, .field .dash {
      font-size: 21px; font-weight: 600; letter-spacing: -0.4px; line-height: 1;
      color: var(--ink); font-variant-numeric: tabular-nums;
    }
    .field .fu, .field .fw { font-size: 11px; font-weight: 500; color: var(--tertiary); }
    .field .fw { margin-left: 4px; }
    /* TIME +/−, TDS, Brew★, Bean★ values are amber */
    .field.amber .fnum, .field.amber .dash { color: var(--accent); }

    /* ── Tap-to-edit sheet ── */
    .ed-bg { position: fixed; inset: 0; background: rgba(0,0,0,.30); display: none;
      align-items: flex-end; justify-content: center; z-index: 60; }
    .ed-bg.open { display: flex; }
    .ed-sheet { background: #fff; width: 100%; max-width: 440px; border-radius: 22px 22px 0 0;
      padding: 16px 20px calc(22px + env(safe-area-inset-bottom));
      -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
    .ed-sheet h3 { font-size: 11px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase;
      color: var(--secondary); text-align: center; margin-bottom: 16px; }
    .ed-big { display: flex; align-items: center; justify-content: center; gap: 22px; margin-bottom: 16px; }
    .ed-big button { width: 58px; height: 58px; border-radius: 50%; border: 1.5px solid var(--ink);
      background: #fff; font-size: 28px; color: var(--ink); line-height: 1; font-family: inherit; }
    .ed-big button:active { background: var(--ink); color: #fff; }
    .ed-big .ed-v { font-size: 42px; font-weight: 700; letter-spacing: -1.5px; min-width: 130px;
      text-align: center; font-variant-numeric: tabular-nums; }
    .ed-big .ed-v small { font-size: 18px; font-weight: 500; color: var(--tertiary); }
    .ed-chips { display: flex; flex-wrap: nowrap; gap: 7px; justify-content: center; margin-bottom: 14px; }
    .ed-chips .chip { padding: 9px 12px; border-radius: 999px; border: 1.4px solid var(--hairline); white-space: nowrap;
      background: #fff; color: var(--ink); font-size: 15px; font-weight: 600; font-family: inherit; }
    .ed-chips .chip.sel { background: var(--ink); color: #fff; border-color: var(--ink); }
    .ed-chips .chip .cw { font-size: 11px; font-weight: 500; opacity: .7; margin-left: 4px; }
    .ed-type { display: block; margin: 0 auto 14px; background: none; border: none;
      color: var(--secondary); font-family: inherit; font-size: 12.5px; text-decoration: underline; }
    .ed-done { display: block; width: 100%; padding: 14px; border-radius: 999px; background: var(--ink);
      color: #fff; border: none; font-family: inherit; font-size: 16px; font-weight: 600; }

    /* Time cell with +/- */
    .time-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .time-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 1px;
    }

    .time-controls .value {
      font-size: 16px;
      font-weight: 700;
      color: #000;
      min-width: 18px;
      text-align: center;
    }

    .btn-adj {
      background: none;
      border: none;
      font-size: 17px;
      color: #000;
      cursor: pointer;
      line-height: 1;
      padding: 0 2px;
      font-family: inherit;
    }

    /* ── Notes — two soft-labeled rows reading as one block ──
       Brew note (transient, per-brew) + Bean note (persists to the bean). */
    .notes-section {
      margin-top: 4px;
      border-top: 0.5px solid var(--hairline);
      padding-top: 8px;
    }
    .notes-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 5px 0;
    }
    .notes-row + .notes-row { border-top: 0.5px solid var(--hairline); }
    .notes-tag {
      flex: none;
      width: 38px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--secondary);
      padding-top: 2px;
    }
    .notes-input {
      flex: 1;
      display: block;
      border: none;
      outline: none;
      resize: none;
      /* Heights are set by growNotes(): the two fields share a fixed ~4-line budget,
         each taking only what its content needs (the short one yields to the long
         one). Overflow scrolls within the field, so the page stays one screen. */
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      font-size: 16px;   /* ≥16px stops iOS auto-zoom on focus */
      color: var(--ink);
      line-height: 1.4;
      padding: 0;
      font-family: inherit;
      background: transparent;
      text-align: left;
    }
    .notes-input::placeholder { color: var(--tertiary); }

    /* ── Header history button ── */
    .header { position: relative; }
    .history-btn {
      position: absolute;
      top: 0; right: 0;
      background: none;
      border: none;
      font-size: 16px;
      color: var(--accent);
      cursor: pointer;
      font-family: inherit;
      font-weight: 400; letter-spacing: -0.2px;
      padding: 4px 0;
    }
    .history-btn:active { opacity: 0.45; }

    /* ── Editable brew name ── */
    input.brew-name {
      width: 100%;
      background: transparent;
      font-family: inherit;
      outline: none;
      border: none;
      border-bottom: 1px solid #e8e8e8;
    }
    input.brew-name:focus { border-bottom-color: #bbb; }

    /* ── Save button ── */
    .save-row {
      display: flex;
      justify-content: center;
      margin-top: 16px;
    }
    .btn-save {
      position: relative;
      overflow: hidden;
      background: var(--ink);
      color: #fff;
      border: 1.5px solid var(--ink);
      border-radius: 999px;
      font-size: 17px;
      font-weight: 600;
      padding: 15px 44px;
      cursor: pointer;
      letter-spacing: -0.2px;
      font-family: inherit;
      transition: transform .12s ease, opacity .15s;
      -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
    }
    .btn-save:active { transform: scale(0.97); opacity: 0.9; }
    .btn-save.saved { background: #fff; color: var(--ink); }

    /* ── History overlay ── */
    .history-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.25);
      display: none;
      justify-content: center;
      z-index: 10;
    }
    .history-overlay.open { display: flex; }
    .history-panel {
      background: #fff;
      width: 100%;
      max-width: 390px;
      height: 100%;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.25s ease;
    }
    .history-overlay.open .history-panel { transform: translateX(0); }
    .history-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 20px 12px;
      border-bottom: 1px solid #e8e8e8;
    }
    .history-head h2 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .history-close {
      background: none;
      border: none;
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      color: #000;
      font-family: inherit;
      padding: 0 2px;
    }
    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0 24px;
    }
    .history-empty {
      text-align: center;
      color: #bbb;
      font-size: 13px;
      padding: 48px 20px;
    }
    .brew-card {
      padding: 12px 20px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      /* Long-press = our Edit/Delete gesture; suppress iOS text-selection + callout */
      -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
    }
    .brew-card:active { background: #f7f7f7; }
    .brew-card .bc-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .brew-card .bc-name { font-size: 14px; font-weight: 600; color: #000; }
    .brew-card .bc-date {
      font-size: 10px;
      color: #aaa;
      white-space: nowrap;
      margin-left: 8px;
    }
    .brew-card .bc-stats {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
      font-variant-numeric: tabular-nums;
    }
    .brew-card .bc-detail { display: none; margin-top: 12px; }
    .brew-card.expanded .bc-detail { display: block; }
    .bc-detail .bc-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 5px 18px;
    }
    .bc-detail .bc-grid .row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #000;
      font-variant-numeric: tabular-nums;
    }
    .bc-detail .bc-grid .row .k { color: #999; }
    .bc-detail .bc-notes {
      font-size: 12px;
      color: #555;
      margin-top: 10px;
      font-style: italic;
    }
    .bc-detail .bc-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }
    .bc-actions button {
      flex: 1;
      font-size: 11px;
      padding: 6px 0;
      border: 1px solid #000;
      border-radius: 16px;
      background: none;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.3px;
    }
    .bc-actions .bc-delete { border-color: #c00; color: #c00; }

    /* ── Screen nav toggle (top-left, mirrors history) ── */
    .nav-btn {
      position: absolute;
      top: 0; left: 0;
      background: none; border: none;
      font-size: 16px; color: var(--accent);
      cursor: pointer; font-family: inherit;
      font-weight: 400; letter-spacing: -0.2px;
      padding: 4px 0;
    }
    .nav-btn:active { opacity: 0.45; }

    /* ── Screens ── */
    .screen[hidden] { display: none; }

    /* ── Bean screen ── */
    input.bean-name {
      width: 100%; font-size: 20px; font-weight: 600; color: #000;
      text-align: center; background: transparent; border: none;
      border-bottom: 1px solid #e8e8e8; outline: none; font-family: inherit;
      padding: 14px 0 6px;
    }
    input.bean-name:focus { border-bottom-color: #bbb; }
    input.bean-name::placeholder { color: #ccc; font-weight: 500; }

    input.roaster {
      width: 100%; font-size: 16px; font-weight: 500; color: #555;
      text-align: center; background: transparent; border: none;
      border-bottom: 1px solid #e8e8e8; outline: none; font-family: inherit;
      padding: 8px 0 10px;
    }
    input.roaster:focus { border-bottom-color: #bbb; }
    input.roaster::placeholder { color: #ccc; }

    .bean-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      border-bottom: 1px solid #e8e8e8;
    }
    .bean-grid.one-col { grid-template-columns: 1fr; }
    .bean-cell {
      padding: 9px 6px; text-align: center;
      border-right: 1px solid #e8e8e8; border-top: 1px solid #e8e8e8;
    }
    .bean-grid .bean-cell:nth-child(-n+2) { border-top: none; }
    .bean-grid .bean-cell:nth-child(2n) { border-right: none; }
    .bean-grid.one-col .bean-cell { border-right: none; border-top: none; }
    .bean-cell .label {
      font-size: 9px; font-weight: 600; color: #888; text-transform: uppercase;
      letter-spacing: 0.4px; display: block; margin-bottom: 4px;
    }
    .value-input::placeholder { color: #ccc; font-weight: 500; }
    /* Bean cells hold free text (e.g. "Anaerobic Natural") — size to fit the cell */
    .bean-cell .value-input { font-size: 16px; font-weight: 600; width: 100%; }
    .bean-date { font-size: 16px; width: 100%; min-height: 34px; padding: 5px 0; }
    .bean-cell .chips { display: flex; gap: 5px; justify-content: center; margin-top: 7px; }
    .bean-cell .chips button {
      font-family: inherit; font-size: 11px; font-weight: 600; color: #888;
      background: #f4f4f4; border: none; border-radius: 999px; padding: 3px 10px; cursor: pointer;
    }
    .bean-cell .chips button:active { background: var(--ink); color: #fff; }

    /* ── Bean tab: list-first + form ── */
    .bean-new {
      width: 100%; padding: 14px; margin-top: 8px; border-radius: 14px;
      border: 1.5px dashed var(--hairline); background: #fff;
      font-family: inherit; font-size: 15px; font-weight: 600; color: var(--ink); cursor: pointer;
    }
    .bean-new:active { background: #f6f6f6; }
    .bean-list { margin-top: 12px; display: flex; flex-direction: column; gap: 10px;
      max-height: calc(100dvh - 180px); overflow-y: auto; -webkit-overflow-scrolling: touch; }
    #bean-form-view { max-height: calc(100dvh - 70px); overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .bean-back {
      background: none; border: none; font-family: inherit; font-size: 14px; color: var(--secondary);
      padding: 6px 0 4px; cursor: pointer; align-self: flex-start;
    }
    .bean-back:active { color: var(--ink); }
    .brew-card.locked { opacity: 0.55; }
    .brew-card.holding { background: #f0f0f0; transition: background .15s; }
    .bc-lock { font-size: 10px; color: var(--accent); font-weight: 600; letter-spacing: 0.3px; }

    /* Bean action sheet buttons (reuses .ed-bg / .ed-sheet) */
    .act-btns { display: flex; flex-direction: column; gap: 10px; margin-bottom: 8px; }
    .act-btn { width: 100%; padding: 14px; border-radius: 14px; border: 1.5px solid var(--ink);
      background: #fff; color: var(--ink); font-family: inherit; font-size: 16px; font-weight: 600; }
    .act-btn:active { background: var(--ink); color: #fff; }
    .act-btn:disabled { border-color: var(--hairline); color: var(--secondary); font-weight: 500;
      font-size: 13px; background: #fafafa; }
    .act-btn.danger { border-color: #e3b7b7; color: #c0392b; }
    .act-btn.danger:active { background: #c0392b; border-color: #c0392b; color: #fff; }

    .text-field { padding: 11px 0 9px; border-bottom: 1px solid #e8e8e8; }
    .text-field .label {
      font-size: 9px; font-weight: 600; color: #888; text-transform: uppercase;
      letter-spacing: 0.4px; display: block; margin-bottom: 5px; text-align: center;
    }
    .text-field input {
      width: 100%; border: none; outline: none; background: transparent;
      font-family: inherit; font-size: 16px; color: #555; text-align: center;
    }
    .text-field input::placeholder { color: #ccc; }

    /* ── Selected-coffee bar (BREW screen) ── */
    .bean-bar {
      width: 100%;
      background: transparent;
      border: none;
      border-top: 0.5px solid var(--hairline);
      border-bottom: 0.5px solid var(--hairline);
      font-family: inherit;
      padding: 13px 0 12px;
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      transition: background .15s;
    }
    .bean-bar:active { background: rgba(60,60,67,0.04); }
    .bean-bar-row { display: flex; align-items: center; gap: 8px; }
    .bean-bar-name { font-size: 17px; font-weight: 500; color: var(--ink); letter-spacing: -0.2px; }
    .bean-bar:not(.has-bean) .bean-bar-name { color: var(--secondary); }
    .bean-bar-chev { color: var(--tertiary); flex: none; }
    .bean-bar-roast { font-size: 11px; color: var(--tertiary); letter-spacing: 0.2px; }

    /* ── Two-button save row (BEAN input) ── */
    .save-row.two { gap: 10px; }
    .btn-save.secondary { background: #fff; color: #000; border: 1.5px solid var(--ink); }
    .btn-save.secondary:active { background: #f0f0f0; }

    /* Brew edit mode: Cancel · Save row replaces the timer button; locked fields dim */
    .edit-actions { display: flex; gap: 10px; width: 100%; }
    .edit-actions[hidden] { display: none; }
    .edit-actions .btn-save { flex: 1; width: auto; min-width: 0; }
    .locked-field { opacity: 0.4; pointer-events: none; }

    /* ── Bean-card actions: prominent "brew this", demoted delete ── */
    .bc-actions .bc-brew { flex: 1; background: #000; color: #fff; border-color: #000; }
    .bc-delete-link {
      display: block; margin: 12px auto 0;
      background: none; border: none;
      font-size: 10px; color: #caa; cursor: pointer;
      font-family: inherit; letter-spacing: 0.3px; text-decoration: underline;
    }
    .bc-delete-link:active { color: #c00; }

    /* ── Custom autocomplete dropdown (replaces native <datalist>) ── */
    .ac { position: relative; width: 100%; }
    .ac-list {
      position: absolute; top: 100%; left: 0; right: 0;
      background: #fff; border: 1px solid #ddd;
      max-height: 168px; overflow-y: auto; z-index: 30;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.10);
      text-align: left;
    }
    .ac-list[hidden] { display: none; }
    .ac-item {
      padding: 8px 12px; font-size: 13px; color: #000;
      cursor: pointer; white-space: nowrap;
    }
    .ac-item.active, .ac-item:hover { background: #f0f0f0; }

    /* ── History panel export action ── */
    .hh-actions { display: flex; align-items: center; gap: 14px; }
    .history-export {
      background: none; border: none; font-family: inherit;
      font-size: 12px; font-weight: 600; letter-spacing: 0.6px;
      color: #888; cursor: pointer; text-transform: uppercase;
    }
    .history-export:active { color: #000; }
  </style>
</head>
<body>
  <div class="app">

  <script>
    // ── Date display (live — updates while open and on re-focus) ──
    const dateOpts = { day: 'numeric', month: 'long', year: 'numeric' };
    function updateClock() {
      const d = new Date();
      const t = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }).toLowerCase();
      document.getElementById('date-display').textContent =
        d.toLocaleDateString('en-US', dateOpts) + '  ' + t;
    }
    updateClock();
    setInterval(updateClock, 30000);
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) return;
      updateClock();
      if (audioCtx) audioCtx.resume();   // re-prime audio after returning from background (iOS)
    });

    // ── TIME +/- display ─────────────────────────────────────────
    const timeDisplay = document.getElementById('time-val');

    // The bottom button's label reflects the timer state; driven from render().
    // labelLocked briefly suppresses updates so a "saved ✓" / hint flash can show.
    let labelLocked = false;
    function updateButtonLabel() {
      if (labelLocked) return;
      const lab = document.getElementById('btn-label');
      if (!lab) return;
      lab.textContent = (running || inCountdown) ? 'stop'
                      : (elapsed > 0) ? 'save brew'
                      : 'start';
    }

    // Notes: the Brew + Bean fields share a fixed ~4-line budget. Each takes only
    // the lines its content needs; the short field yields its slack to the long one
    // (exploits the Brew↔Bean anti-correlation). Only when BOTH want more than their
    // half does anything scroll. Total footprint is constant → page stays one screen.
    const NOTES_BUDGET_LINES = 4;
    function growNotes() {
      const brew = document.getElementById('notes-brew'), bean = document.getElementById('notes-bean');
      const lh = parseFloat(getComputedStyle(brew).lineHeight) || 22;
      const budget = NOTES_BUDGET_LINES * lh;
      // natural content height of each (uncapped)
      const need = {};
      [brew, bean].forEach(el => { el.style.height = 'auto'; need[el.id] = el.scrollHeight; });
      const half = budget / 2;
      let hBrew, hBean;
      if (need['notes-brew'] + need['notes-bean'] <= budget) {
        hBrew = need['notes-brew']; hBean = need['notes-bean'];      // both fit
      } else if (need['notes-brew'] <= half) {
        hBrew = need['notes-brew']; hBean = budget - hBrew;          // brew short → bean takes the rest
      } else if (need['notes-bean'] <= half) {
        hBean = need['notes-bean']; hBrew = budget - hBean;          // bean short → brew takes the rest
      } else {
        hBrew = half; hBean = half;                                  // both long → split evenly, both scroll
      }
      brew.style.height = Math.max(lh, hBrew) + 'px';
      bean.style.height = Math.max(lh, hBean) + 'px';
    }

    // ── Field word maps + tap-to-edit config ────────────────────
    const AGITATE_WORDS = { '0':'none','1':'min','2':'low','3':'mid','4':'high' };
    const BREW_RATINGS  = { '1':'1st','2':'dial','3':'test','4':'good','5':'best' };
    const FX = {
      'dose':        {label:'Dose',  step:0.1, dec:1, trim:1, min:0,  max:99,  unit:'g',  presets:[23,24,25,72], type:'num'},
      'grind':       {label:'Grind', step:0.5, dec:1, trim:1, min:0,  max:40,  unit:'#',  presets:[7,8,9,10],    type:'num'},
      'agitate':     {label:'Agitate', step:1, min:0, max:4,  presets:[0,1,2,3,4], type:'choice', words:AGITATE_WORDS},
      'contact':     {label:'Contact', step:30, min:60, max:600, presets:[210,240,270,300,390], type:'time'},
      'water':       {label:'Water', step:1, min:150, max:212, unit:'°F', presets:[196,200,204,208,212], type:'num'},
      'bloom':       {label:'Bloom', step:2, min:0, max:400, unit:'ml', presets:[80,100,120,300], type:'num'},
      'decay':       {label:'Decay', step:1, min:0, max:100, unit:'%', presets:[85,90,95,100], type:'num'},
      'brew-target': {label:'Target', step:10, min:0, max:9999, unit:'ml', presets:[350,1050], type:'num'},
      'time-val':    {label:'Time +/−', step:1, min:-999, max:999, signed:1, presets:[-25,-5,5,25], type:'num'},
      'tds':         {label:'TDS', step:0.01, dec:2, min:0, max:9.99, presets:[1.70,1.71,1.72,1.73,1.74], type:'num'},
      'brew-rating': {label:'Brew★', step:1, min:1, max:5, presets:[1,2,3,4,5], type:'choice', words:BREW_RATINGS},
      'bean-rating': {label:'Bean★', step:1, min:0, max:100, presets:[85,90,92,95,98], type:'num'}
    };
    const fmtMS  = sec => Math.floor(sec/60) + ':' + String(Math.abs(sec)%60).padStart(2,'0');
    const fmtNum = (c,n) => c.signed ? (n>0?'+':'')+n : c.trim ? String(+(+n).toFixed(c.dec||0)) : c.dec ? (+n).toFixed(c.dec) : String(n);

    // Render one field's display button from its hidden store element
    function renderField(key){
      const c = FX[key], el = document.getElementById(key), btn = document.querySelector('.field[data-f="'+key+'"]');
      if (!c || !el || !btn) return;
      const v = el.value;
      if (v === '' || v == null) { btn.innerHTML = '<span class="dash">–</span>'; return; }
      if (c.type === 'choice') { const w = c.words[v]; btn.innerHTML = '<span class="fnum">'+v+'</span>'+(w?'<span class="fw">'+w+'</span>':''); return; }
      if (c.type === 'time')   { btn.innerHTML = '<span class="fnum">'+fmtMS(parseInt(v))+'</span>'; return; }
      btn.innerHTML = '<span class="fnum">'+fmtNum(c, parseFloat(v))+'</span>'+(c.unit?'<span class="fu">'+c.unit+'</span>':'');
    }
    function renderAllFields(){ Object.keys(FX).forEach(renderField); }

    // Write Bean★ back onto the selected bean, overwriting its previous rating
    function persistBeanRating(){
      if (!(currentBean && currentBean.id)) return;
      const beans = getBeans();
      const b = beans.find(x => x.id === currentBean.id);
      if (b && !b.locked) { b.rating = document.getElementById('bean-rating').value; setBeans(beans); currentBean.rating = b.rating; }
    }
    document.getElementById('bean-rating').addEventListener('change', persistBeanRating);
    // Bean note: overwrite the bean's evolving tasting note with the Bean field
    function persistBeanNote(){
      if (!(currentBean && currentBean.id)) return;
      const beans = getBeans();
      const b = beans.find(x => x.id === currentBean.id);
      if (b && !b.locked) { b.tastingNote = document.getElementById('notes-bean').value.trim(); setBeans(beans); currentBean.tastingNote = b.tastingNote; }
    }

    // ── Tap-to-edit sheet ────────────────────────────────────────
    function repeatHold(btn, fn){
      let to, iv;
      const start = e => { e.preventDefault(); fn(); to = setTimeout(() => iv = setInterval(fn, 75), 380); };
      const stop  = () => { clearTimeout(to); clearInterval(iv); };
      btn.addEventListener('pointerdown', start);
      ['pointerup','pointerleave','pointercancel'].forEach(ev => btn.addEventListener(ev, stop));
    }
    let edKey = null, edVal = '';
    function edShow(){
      const c = FX[edKey];
      let h;
      if (edVal === '' || edVal == null) h = '–';
      else if (c.type === 'choice') { const w = c.words[edVal]; h = edVal + (w?' <small>'+w+'</small>':''); }
      else if (c.type === 'time')   h = fmtMS(edVal);
      else h = fmtNum(c, edVal) + (c.unit?' <small>'+c.unit+'</small>':'');
      document.getElementById('ed-val').innerHTML = h;
      [...document.getElementById('ed-chips').children].forEach(ch => ch.classList.toggle('sel', String(ch.dataset.p) === String(edVal)));
    }
    function edStep(dir){
      const c = FX[edKey];
      const base = (edVal === '' || edVal == null) ? (c.presets[0] != null ? +c.presets[0] : c.min) : +edVal;
      let nv = +(base + dir*c.step).toFixed(2);
      edVal = Math.min(c.max, Math.max(c.min, nv));
      edShow();
    }
    function openEditor(key){
      edKey = key; const c = FX[key]; const raw = document.getElementById(key).value;
      edVal = (raw === '' || raw == null) ? '' : +raw;
      document.getElementById('ed-title').textContent = c.label;
      const ch = document.getElementById('ed-chips'); ch.innerHTML = '';
      c.presets.forEach(p => {
        const b = document.createElement('button'); b.type = 'button'; b.className = 'chip'; b.dataset.p = p;
        if (c.type === 'choice') { const w = c.words[p]; b.innerHTML = p + (w?'<span class="cw">'+w+'</span>':''); }
        else if (c.type === 'time') b.textContent = fmtMS(p);
        else b.textContent = fmtNum(c, p);
        b.onclick = () => { edVal = +p; edShow(); };
        ch.append(b);
      });
      document.getElementById('ed-type').style.display = c.type === 'num' ? 'block' : 'none';
      edShow();
      document.getElementById('ed-bg').classList.add('open');
    }
    function edCommit(){
      const el = document.getElementById(edKey);
      el.value = (edVal === '' || edVal == null) ? '' : String(edVal);
      el.dispatchEvent(new Event('change', { bubbles: true }));  // recalc / bean-persist listeners
      renderField(edKey);
      saveDraft();
      document.getElementById('ed-bg').classList.remove('open');
    }
    repeatHold(document.getElementById('ed-minus'), () => edStep(-1));
    repeatHold(document.getElementById('ed-plus'),  () => edStep(1));
    document.getElementById('ed-type').onclick = () => {
      const c = FX[edKey];
      const t = prompt(c.label + (c.unit?' ('+c.unit+')':''), edVal === '' ? '' : String(edVal));
      if (t != null && t.trim() !== '') { const n = parseFloat(t); if (!isNaN(n)) { edVal = Math.min(c.max, Math.max(c.min, n)); edShow(); } }
    };
    document.getElementById('ed-done').onclick = edCommit;
    document.getElementById('ed-bg').onclick = e => { if (e.target === document.getElementById('ed-bg')) document.getElementById('ed-bg').classList.remove('open'); };
    document.addEventListener('click', e => { const b = e.target.closest('.field'); if (b && b.dataset.f) openEditor(b.dataset.f); });

    // ── Draft autosave: preserve an unsaved brew across close/reopen ──
    const DRAFT_KEY = 'blackmagic.draft';
    const DRAFT_FIELDS = ['dose','grind','agitate','contact','water','bloom','decay','brew-target','time-val','tds','brew-rating','bean-rating'];
    let draftTimer = null;
    // Serialize the live brew form into a plain object (used by draft autosave AND
    // by the edit-from-History "side trip" snapshot).
    function currentDraftObject(){
      const d = { brewNote: $('notes-brew').value, beanNote: $('notes-bean').value,
                  beanId: (currentBean && currentBean.id) || null };
      DRAFT_FIELDS.forEach(k => d[k] = document.getElementById(k).value);
      return d;
    }
    function applyDraftObject(d){
      if (!d) return;
      DRAFT_FIELDS.forEach(k => { if (d[k] !== undefined) document.getElementById(k).value = d[k]; });
      // bean first (it sets the Bean note from the bean), then override from the object
      if (d.beanId) { const b = getBeans().find(x => x.id === d.beanId); setBeanBar(b || null); }
      else setBeanBar(null);
      if (d.brewNote != null) $('notes-brew').value = d.brewNote;
      if (d.beanNote != null) $('notes-bean').value = d.beanNote;
    }
    function saveDraft(){
      if (editingBrewId) return;   // editing a past brew is not a "draft new cup" — don't persist it
      clearTimeout(draftTimer);
      draftTimer = setTimeout(() => {
        if (editingBrewId) return;   // an edit began during the debounce — don't persist it
        try { localStorage.setItem(DRAFT_KEY, JSON.stringify(currentDraftObject())); } catch (e) {}
      }, 300);
    }
    function clearDraft(){ try { localStorage.removeItem(DRAFT_KEY); } catch (e) {} }
    function loadDraft(){
      let d; try { d = JSON.parse(localStorage.getItem(DRAFT_KEY)); } catch (e) {}
      applyDraftObject(d);
    }

    // ── Audio (Web Audio API, created on first user gesture) ─────
    let audioCtx = null;

    function getAudio() {
      if (!audioCtx || audioCtx.state === 'closed')
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state !== 'running') audioCtx.resume();   // covers 'suspended' + iOS 'interrupted'
      return audioCtx;
    }

    // Keep audio unlocked across gestures AND app re-focus. iOS suspends the
    // AudioContext when backgrounded and needs a resume on the next interaction,
    // so we re-prime on every gesture (cheap) instead of just once.
    // NOTE: the physical Ring/Silent switch can still mute Web Audio on iOS.
    let audioPrimed = false;
    function unlockAudio() {
      const ctx = getAudio();
      if (!audioPrimed) {
        try {
          const src = ctx.createBufferSource();
          src.buffer = ctx.createBuffer(1, 1, 22050);
          src.connect(ctx.destination);
          src.start(0);
          audioPrimed = true;
        } catch (e) {}
      }
    }
    ['touchend', 'pointerdown'].forEach(ev => window.addEventListener(ev, unlockAudio));

    // Schedule a tone on the AudioContext's own clock. Scheduling ahead of time
    // (rather than firing oscillators from later setTimeouts) is the key to
    // reliable iOS playback — the countdown queues all its tones at gesture time.
    function tone(freq, dur, when, vol = 0.5) {
      try {
        const ctx = getAudio();
        const t0 = (when == null ? ctx.currentTime : when);
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(vol, t0);
        gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
        osc.start(t0);
        osc.stop(t0 + dur);
        return osc;
      } catch (e) { return null; }
    }
    function beep(freq, dur, vol = 0.5) { return tone(freq, dur, null, vol); }

    // ── Pour schedule (dynamic — rebuilt from CONTACT, DECAY, BREW TARGET) ──
    // Geometric decay series: pour_i = x · r^i, where r = DECAY/100
    // Sum of n pours = BREW_TARGET  →  x = BREW_TARGET · (1−r) / (1−r^n)
    const CYCLE_SECS = 30;
    const CLOCK_SCOPE = 240; // timer face always spans 4 minutes; wraps if brew is longer
    let POUR_TARGETS = [];
    let TOTAL = 270; // updated by recalcSchedule()

    function recalcSchedule() {
      const contactSecs = parseInt(document.getElementById('contact').value) || 270;
      const brewTarget  = Math.round(parseFloat(document.getElementById('brew-target').value) || 350);
      const decayPct    = parseFloat(document.getElementById('decay').value);
      const r = decayPct / 100;
      const n = Math.max(1, Math.round(contactSecs / CYCLE_SECS));
      TOTAL = n * CYCLE_SECS;

      const x = Math.abs(r - 1) < 0.001
        ? brewTarget / n                              // equal distribution (DECAY = 100%)
        : brewTarget * (1 - r) / (1 - Math.pow(r, n));

      POUR_TARGETS = [];
      for (let i = 0; i < n; i++) {
        const cumul = Math.abs(r - 1) < 0.001
          ? Math.round(x * (i + 1))
          : Math.round(x * (1 - Math.pow(r, i + 1)) / (1 - r));
        POUR_TARGETS.push(cumul);
      }
      POUR_TARGETS[POUR_TARGETS.length - 1] = brewTarget; // exact final target

      drawTicks();
    }

    function pourTarget(s) {
      if (!POUR_TARGETS.length) return 0;
      return POUR_TARGETS[Math.min(Math.floor(s / CYCLE_SECS), POUR_TARGETS.length - 1)];
    }

    function fmtTime(s) {
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${String(sec).padStart(2, '0')}`;
    }

    // ── Tick marks — fixed 4-min face, no numeric labels ─────────
    function drawTicks() {
      const g = document.getElementById('t-ticks');
      g.innerHTML = '';
      const ns = 'http://www.w3.org/2000/svg';
      const n = CLOCK_SCOPE / CYCLE_SECS; // 8
      for (let i = 0; i < n; i++) {
        const tickSecs = (i + 1) * CYCLE_SECS;
        const isMinute = tickSecs % 60 === 0;
        const isTop = (i === n - 1);   // 12 o'clock — bold cycle anchor (start/end mark)
        const a = ((i + 1) / n) * 2 * Math.PI - Math.PI / 2;
        const r0 = isTop ? 74 : 77, r1 = isTop ? 90 : (isMinute ? 86 : 82);
        const ln = document.createElementNS(ns, 'line');
        ln.setAttribute('x1', (100 + r0 * Math.cos(a)).toFixed(2));
        ln.setAttribute('y1', (100 + r0 * Math.sin(a)).toFixed(2));
        ln.setAttribute('x2', (100 + r1 * Math.cos(a)).toFixed(2));
        ln.setAttribute('y2', (100 + r1 * Math.sin(a)).toFixed(2));
        ln.setAttribute('stroke', isTop ? 'rgba(60,60,67,0.40)' : isMinute ? 'rgba(60,60,67,0.28)' : 'rgba(60,60,67,0.16)');
        ln.setAttribute('stroke-width', isTop ? '3.4' : isMinute ? '2.8' : '1.3');
        ln.setAttribute('stroke-linecap', 'round');
        g.appendChild(ln);
      }
    }

    // ── Timer state ──────────────────────────────────────────────
    const CIRC = 2 * Math.PI * 93;
    let elapsed = 0, running = false, lastTs = null;
    let inCountdown = false;
    let loadedFromHistory = false;   // true while editing a brew loaded from History

    function render(s) {
      const pos = s % CLOCK_SCOPE;
      const arcFrac = (pos === 0 && s > 0) ? 1 : pos / CLOCK_SCOPE;
      const progColor = s >= CLOCK_SCOPE ? '#000' : '#555';   // grey first 4 min, black after
      const arc = document.getElementById('t-arc');
      arc.setAttribute('stroke-dashoffset', (CIRC * (1 - arcFrac)).toFixed(3));
      arc.setAttribute('stroke', progColor);
      const a = ((s % CYCLE_SECS) / CYCLE_SECS) * 2 * Math.PI - Math.PI / 2;
      const hand = document.getElementById('t-hand');   // inner r=50 keeps clear of the center number
      hand.setAttribute('x1', (100 + 50 * Math.cos(a)).toFixed(2));
      hand.setAttribute('y1', (100 + 50 * Math.sin(a)).toFixed(2));
      hand.setAttribute('x2', (100 + 84 * Math.cos(a)).toFixed(2));
      hand.setAttribute('y2', (100 + 84 * Math.sin(a)).toFixed(2));
      if (!inCountdown) document.getElementById('t-ml').textContent = pourTarget(s);
      document.getElementById('t-timer').textContent = fmtTime(s);   // live elapsed (results row)
      updateButtonLabel();
    }

    function tick(ts) {
      if (running) {
        if (lastTs !== null) {
          const prev = elapsed;
          elapsed = elapsed + (ts - lastTs) / 1000;   // counts up past TOTAL — records long brews
          // Beep at each 30-second pour boundary, but only for scheduled pours
          const cyc = Math.floor(elapsed / CYCLE_SECS);
          if (cyc > Math.floor(prev / CYCLE_SECS) && cyc <= POUR_TARGETS.length) {
            beep(880, 0.18, 0.45);
          }
        }
        lastTs = ts;
      } else {
        lastTs = null;
      }
      render(elapsed);
      requestAnimationFrame(tick);
    }

    // ── 3-second countdown before brew starts ────────────────────
    // Pitches rise G4→A4→C5 to build anticipation; GO tone is G5. All four
    // tones are scheduled on the audio clock at the start gesture, so iOS plays
    // them reliably even though the visual countdown runs off setTimeout.
    let countdownNodes = [];
    function cancelCountdownAudio() {
      countdownNodes.forEach(o => { try { o && o.stop(); } catch (e) {} });
      countdownNodes = [];
    }
    function startCountdown() {
      inCountdown = true;
      const ctx = getAudio();              // resume/unlock audio on this gesture
      const t0 = ctx.currentTime + 0.06;
      countdownNodes = [];
      [392, 440, 523].forEach((p, i) => countdownNodes.push(tone(p, 0.15, t0 + i, 0.6)));
      countdownNodes.push(tone(784, 0.4, t0 + 3, 0.7)); // G5 "GO"

      let count = 3;
      const step = () => {
        if (!inCountdown) return;
        document.getElementById('t-ml').textContent = count;
        count--;
        if (count > 0) {
          setTimeout(step, 1000);
        } else {
          setTimeout(() => {
            if (!inCountdown) return;
            inCountdown = false;
            elapsed = 0;
            running = true;
            lastTs = null;
            countdownNodes = [];
            render(0);
          }, 1000);
        }
      };
      step();
    }

    // ── Clock reset (zeroes the clock only; used on recipe-field change). The
    //    full clear incl. TIME/TDS/Rating is clearForNextBrew() — save / hold-reset. ─
    function resetTimer() {
      inCountdown = false;
      running = false;
      elapsed = 0;
      lastTs = null;
      cancelCountdownAudio();
      render(0);
    }

    // ── Field change → recalc schedule + reset timer ─────────────
    ['contact', 'decay', 'brew-target'].forEach(id => {
      document.getElementById(id).addEventListener('change', () => {
        recalcSchedule();
        resetTimer();
      });
    });

    // ── Press helper: distinguishes a quick tap from a 2-second hold ──────
    // During a hold an element fills (.holding); releasing early cancels, so only
    // a completed hold fires onHold — committing/clearing actions resist mis-taps.
    function bindPressable(el, opts) {
      const { onTap, onHold, holdMs = 2000, holdWhen } = opts;
      let timer = null, fired = false, down = false;
      el.addEventListener('pointerdown', e => {
        e.preventDefault();
        down = true; fired = false;
        if (onHold && (!holdWhen || holdWhen())) {
          el.classList.add('holding');
          timer = setTimeout(() => {
            timer = null; fired = true; el.classList.remove('holding'); onHold();
          }, holdMs);
        }
      });
      const finish = doTap => {
        if (!down) return; down = false;
        if (timer) { clearTimeout(timer); timer = null; }
        el.classList.remove('holding');
        if (doTap && !fired && onTap) onTap();
      };
      el.addEventListener('pointerup', () => finish(true));
      el.addEventListener('pointerleave', () => finish(false));
      el.addEventListener('pointercancel', () => finish(false));
    }

    // Dial: HOLD 2s to reset everything (no save). A tap does nothing.
    bindPressable(document.querySelector('.timer-circle-wrap'), { onHold: clearForNextBrew });

    // ── Brew history (localStorage) ──────────────────────────────
    const STORE_KEY = 'blackmagic.brews';

    function getBrews() {
      try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
      catch (e) { return []; }
    }
    function setBrews(arr) {
      localStorage.setItem(STORE_KEY, JSON.stringify(arr));
    }
    // Strictly increasing, unique id even for saves in the same millisecond
    function nextId() {
      const maxId = getBrews().reduce((m, b) => Math.max(m, b.id), 0);
      return Math.max(Date.now(), maxId + 1);
    }

    const $ = id => document.getElementById(id);

    // Snapshot every field into a record
    function collectRecord() {
      const agitate = $('agitate'), contact = $('contact');
      return {
        id: nextId(),
        savedAt: new Date().toISOString(),
        brewName: currentBean ? composeName(currentBean) : 'Untitled brew',
        beanId: currentBean ? currentBean.id : null,
        beanName: currentBean ? (currentBean.name || '') : '',
        beanRoaster: currentBean ? (currentBean.roaster || '') : '',
        roastDate: currentBean ? (currentBean.roastDate || '') : '',
        dose: $('dose').value,
        grind: $('grind').value,
        agitate: agitate.value,
        agitateText: agitate.selectedOptions[0].text,
        contact: contact.value,
        contactText: contact.selectedOptions[0].text,
        water: $('water').value,
        bloom: $('bloom').value,
        decay: $('decay').value,
        brewTarget: $('brew-target').value,
        timeAdj: $('time-val').value,
        tds: $('tds').value,
        brewRating: $('brew-rating').value,
        beanRating: $('bean-rating').value,
        brewNote: $('notes-brew').value.trim(),
        beanNote: $('notes-bean').value.trim()
      };
    }

    // Write a record back into the live form
    function applyRecord(r) {
      const live = !r.locked && liveBean(r.beanId);
      setBeanBar(live ? live
        : (r.beanId || r.beanName || r.brewName) ? { id: r.beanId || null, name: r.beanName || r.brewName, roaster: r.beanRoaster || '', roastDate: r.roastDate || '' }
        : null);
      $('dose').value = r.dose;
      $('grind').value = r.grind;
      $('agitate').value = r.agitate;
      $('contact').value = r.contact;
      $('water').value = r.water;
      $('bloom').value = r.bloom;
      $('decay').value = r.decay;
      $('brew-target').value = r.brewTarget;
      $('tds').value = r.tds;
      $('brew-rating').value = r.brewRating || '';   // Bean★ comes from the bean (setBeanBar)
      // Show the record exactly as saved (setBeanBar already filled the live bean note)
      $('notes-brew').value = r.brewNote || r.notes || '';
      $('notes-bean').value = r.beanNote || '';
      $('bean-rating').value = (r.beanRating != null ? r.beanRating : '');
      renderField('bean-rating');
      growNotes();
      timeDisplay.value = r.timeAdj;
      renderAllFields();
      // A brew loaded from history is being edited, not freshly brewed: re-saving it
      // must NOT overwrite the bean's current note/rating with these old values.
      loadedFromHistory = true;
      saveDraft();
      // Programmatic .value changes don't fire 'change', so reset timer manually
      inCountdown = false;
      running = false;
      elapsed = 0;
      lastTs = null;
      cancelCountdownAudio();
      recalcSchedule();
      render(0);
    }

    function fmtSavedAt(iso) {
      const dt = new Date(iso);
      const date = dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      const time = dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }).toLowerCase();
      return `${date} · ${time}`;
    }

    function renderHistory() {
      const list = $('history-list');
      const brews = getBrews().sort((a, b) => b.id - a.id);
      list.innerHTML = '';

      if (!brews.length) {
        list.innerHTML = '<div class="history-empty">No saved brews yet.</div>';
        return;
      }

      brews.forEach(r => {
        const idn = brewIdentity(r);
        const card = document.createElement('div');
        card.className = 'brew-card' + (r.locked ? ' locked' : '');
        const dose = r.dose ? r.dose + 'g' : '—';
        const tds = r.tds ? 'TDS ' + r.tds : 'TDS —';
        const brewR = r.brewRating || r.rating || '';
        const rating = brewR ? '★' + brewR : '★—';
        card.innerHTML = `
          <div class="bc-top">
            <span class="bc-name"></span>
            <span class="bc-date">${fmtSavedAt(r.savedAt)}</span>
          </div>
          <div class="bc-stats">${dose} · ${tds} · ${rating}</div>
          <div class="bc-detail">
            <div class="bc-grid">
              <div class="row"><span class="k">Roast</span><span>${idn.roastDate ? fmtDateShort(idn.roastDate) : '—'}</span></div>
              <div class="row"><span class="k">Dose</span><span>${r.dose || '—'} g</span></div>
              <div class="row"><span class="k">Grind</span><span>${r.grind || '—'}</span></div>
              <div class="row"><span class="k">Agitate</span><span>${r.agitateText}</span></div>
              <div class="row"><span class="k">Contact</span><span>${r.contactText}</span></div>
              <div class="row"><span class="k">Water</span><span>${r.water || '—'} F°</span></div>
              <div class="row"><span class="k">Bloom</span><span>${r.bloom || '—'} ml</span></div>
              <div class="row"><span class="k">Decay</span><span>${r.decay || '—'} %</span></div>
              <div class="row"><span class="k">Target</span><span>${r.brewTarget || '—'} ml</span></div>
              <div class="row"><span class="k">Time +/−</span><span>${r.timeAdj}</span></div>
              <div class="row"><span class="k">TDS</span><span>${r.tds || '—'}</span></div>
              <div class="row"><span class="k">Brew★</span><span>${r.brewRating || r.rating || '—'}</span></div>
              <div class="row"><span class="k">Bean★</span><span>${r.beanRating || '—'}</span></div>
            </div>
            ${(() => { const bw=(r.brewNote||r.notes||'').trim(), bn=(r.beanNote||'').trim();
              const esc=s=>s.replace(/</g,'&lt;');
              const parts=[]; if(bw)parts.push('<b>Brew:</b> '+esc(bw)); if(bn)parts.push('<b>Bean:</b> '+esc(bn));
              return parts.length?'<div class="bc-notes">'+parts.join('<br>')+'</div>':''; })()}
          </div>`;
        card.querySelector('.bc-name').textContent = idn.brewName;
        if (r.locked) card.querySelector('.bc-date').classList.add('bc-lock');

        // Tap does nothing; hold 2s → Edit / Delete sheet (details live on Edit)
        bindLongPress(card, { onHold: () => openBrewActions(r) });

        list.appendChild(card);
      });
    }

    let shownData = 'brews';   // dataset the export button writes (beans now export per-bean)
    function openHistory() {
      shownData = 'brews';
      $('history-title').textContent = 'Brews';
      renderHistory();
      $('history-overlay').classList.add('open');
    }
    function closeHistory() {
      $('history-overlay').classList.remove('open');
    }

    // Clear the brew tab for the next cup — timer + TIME/TDS/Rating — while
    // keeping the coffee + recipe. Used by both Save and the dial hold-to-reset.
    function clearForNextBrew() {
      resetTimer();              // zero the clock
      timeDisplay.value = '';
      $('tds').value = '';
      $('brew-rating').value = '';   // Brew★ resets each save/reset; Bean★ stays on the bean
      $('notes-brew').value = '';    // Brew note is per-cup; Bean note persists
      growNotes();
      renderAllFields();
      loadedFromHistory = false;
      clearDraft();
      render(0);
    }
    function flashSaved() {
      const lab = $('btn-label'), btn = $('btn-save');
      labelLocked = true; lab.textContent = 'saved ✓'; btn.classList.add('saved');
      setTimeout(() => { labelLocked = false; btn.classList.remove('saved'); }, 1200);
    }
    function flashHint(msg) {
      if (labelLocked) return;
      const lab = $('btn-label');
      labelLocked = true; lab.textContent = msg;
      setTimeout(() => { labelLocked = false; }, 900);
    }
    function saveBrew() {
      const brews = getBrews();
      if (editingBrewId) {
        // Update a past brew in place. Bean identity + Bean★/Bean-note were locked
        // during edit, so preserve them verbatim — never clobber the bean's verdict.
        const idx = brews.findIndex(b => b.id === editingBrewId);
        if (idx >= 0) {
          const old = brews[idx];
          brews[idx] = Object.assign(collectRecord(), {
            id: old.id, savedAt: old.savedAt, updatedAt: new Date().toISOString(),
            beanRating: old.beanRating, beanNote: old.beanNote,
            locked: old.locked, exportedAt: old.exportedAt
          });
          setBrews(brews);
        }
        exitBrewEdit();
        flashSaved();
        // Side trip done — return to the cup we were brewing, untouched
        if (preEditState) { restoreBrewState(preEditState); preEditState = null; saveDraft(); }
        else clearForNextBrew();
        return;
      }
      brews.push(collectRecord());
      setBrews(brews);
      // Only a freshly-brewed cup updates the bean's evolving note/rating;
      // editing a loaded past brew must not clobber the bean's current verdict.
      if (!loadedFromHistory) { persistBeanRating(); persistBeanNote(); }
      flashSaved();
      clearForNextBrew();        // labelLocked keeps "saved ✓" visible during this
    }

    // Bottom button — tap: start / stop (start countdown cancellable);
    //                 HOLD 2s (only when stopped): save the brew.
    bindPressable($('btn-save'), {
      onTap: () => {
        if (inCountdown) { inCountdown = false; cancelCountdownAudio(); render(0); }
        else if (running) {
          running = false; lastTs = null;
          timeDisplay.value = Math.round(elapsed - TOTAL) - 2;   // −2 reaction-time
          renderField('time-val'); saveDraft();
          render(elapsed);
        }
        else if (elapsed > 0) { flashHint('hold to save'); }     // stopped: tap hints
        else { startCountdown(); }                                // idle
      },
      onHold: saveBrew,
      holdWhen: () => (elapsed > 0 && !running && !inCountdown)    // stopped only
    });

    // ── Brew edit mode (edit a past brew in place; identity + verdict locked) ──
    let editingBrewId = null;

    let preEditState = null;          // the in-progress cup, snapshotted while we side-trip into edit

    // Editing a brew from History is a side trip — snapshot the live cup on the way
    // in, restore it on the way out (Cancel or Save) so the current brew is untouched.
    function captureBrewState(){
      return { draft: currentDraftObject(), elapsed, running, inCountdown, loadedFromHistory };
    }
    function restoreBrewState(s){
      applyDraftObject(s.draft);
      renderAllFields(); growNotes();
      recalcSchedule();
      loadedFromHistory = s.loadedFromHistory;

    // ── CSV export (headers match the spreadsheet; units converted on the way out) ──
    function csvCell(v) {
      if (v === null || v === undefined) v = '';
      v = String(v);
      return /[",\n\r]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v;
    }
    function toCSV(headers, rows) {
      return [headers, ...rows].map(r => r.map(csvCell).join(',')).join('\r\n');
    }
    function csvDateTime(iso) {
      const d = new Date(iso);
      if (isNaN(d)) return '';
      const p = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
    }
    // ── Live reference: an UNLOCKED brew shows its bean's CURRENT identity (so a
    // typo fix flows through); a LOCKED brew keeps the snapshot frozen at export. ──
    function liveBean(id) { return id ? getBeans().find(b => b.id === id) : null; }
    function brewIdentity(r) {
      if (!r.locked) {
        const b = liveBean(r.beanId);
        if (b) return { brewName: composeName(b), beanName: b.name || '', beanRoaster: b.roaster || '', roastDate: b.roastDate || '' };
      }
      return { brewName: r.brewName || 'Untitled brew', beanName: r.beanName || '', beanRoaster: r.beanRoaster || '', roastDate: r.roastDate || '' };
    }

    function brewsToCSV() {
      const H = ['Name','Date','Roaster','Dose','Grind','Temp','Time_Aim','Bloom','Pour_Decay','Agitate','Output','Time_Error','TDS','Brew_Rating','Bean_Rating','Comments','ID','Bean_ID'];
      const rows = getBrews().sort((a, b) => a.id - b.id).map(r => {
        const idn = brewIdentity(r);
        return [
        idn.brewName,
        csvDateTime(r.savedAt),
        idn.beanRoaster,
        r.dose || '',
        r.grind || '',
        r.water || '',
        r.contact ? parseInt(r.contact) / 60 : '',                       // seconds → minutes
        r.bloom || '',
        (r.decay !== '' && r.decay != null) ? parseFloat(r.decay) / 100 : '', // percent → fraction
        (r.agitate == null ? '' : r.agitate),
        r.brewTarget || '',
        (r.timeAdj ?? ''),
        r.tds || '',
        (r.brewRating || r.rating || ''),
        r.beanRating || '',
        (r.brewNote || r.notes || ''),                                   // brew-side note
        r.id,                                                            // stable key for Excel upsert
        (r.beanId || '')                                                 // foreign key → bean
      ]; });
      return toCSV(H, rows);
    }
    function beansToCSV() {
      const H = ['Name','Roaster','Country','Region','Varietal','Process','Roast_Date','Bag_Size_g','Bag_Count','Rating','Roaster_Notes','Comments','ID'];
      const rows = getBeans().sort((a, b) => a.id - b.id).map(b => [
        b.name || '', b.roaster || '', b.country || '', b.region || '', b.varietal || '',
        b.process || '', b.roastDate || '', b.bagSize || '', b.bagCount || '', (b.rating || ''), b.roasterNotes || '',
        [b.tastingNote, b.myNotes].filter(Boolean).join(' — '),           // verdict + any legacy My Notes
        b.id                                                              // stable key for Excel upsert
      ]);
      return toCSV(H, rows);
    }

    // Per-bean flat export: one row per linked brew, the bean's columns prepended
    // (paste-ready for the journal). With no brews yet, emits a single bean row.
    function safeFile(s) { return (String(s || 'bean').replace(/[^\w.-]+/g, '_').replace(/^_+|_+$/g, '')) || 'bean'; }
    function beanBrewCSV(bean, brews) {
      const H = ['Bean','Roaster','Country','Region','Varietal','Process','Roast_Date','Bag_Size_g','Bag_Count','Bean_Rating','Roaster_Notes','Tasting_Note','Bean_ID',
        'Brew_Date','Dose','Grind','Temp','Time_Aim','Bloom','Pour_Decay','Agitate','Output','Time_Error','TDS','Brew_Rating','Brew_Comments','Brew_ID'];
      const beanCols = [bean.name || '', bean.roaster || '', bean.country || '', bean.region || '', bean.varietal || '',
        bean.process || '', bean.roastDate || '', bean.bagSize || '', bean.bagCount || '', (bean.rating || ''),
        bean.roasterNotes || '', [bean.tastingNote, bean.myNotes].filter(Boolean).join(' — '), bean.id];
      const brewCols = r => [
        csvDateTime(r.savedAt), r.dose || '', r.grind || '', r.water || '',
        r.contact ? parseInt(r.contact) / 60 : '', r.bloom || '',
        (r.decay !== '' && r.decay != null) ? parseFloat(r.decay) / 100 : '',
        (r.agitate == null ? '' : r.agitate), r.brewTarget || '', (r.timeAdj ?? ''), r.tds || '',
        (r.brewRating || r.rating || ''), (r.brewNote || r.notes || ''), r.id
      ];
      const rows = brews.length
        ? brews.sort((a, b) => a.id - b.id).map(r => beanCols.concat(brewCols(r)))
        : [beanCols.concat(new Array(14).fill(''))];
      return toCSV(H, rows);
    }
    // Export a bean (+ its brews) to a file, then FREEZE & LOCK both so they match
    // the exported copy and can't drift from the spreadsheet afterward.
    function exportBean(bean) {
      const beans = getBeans();
      const target = beans.find(x => x.id === bean.id);
      if (!target) return;
      const brews = getBrews();
      const linked = brews.filter(r => r.beanId === target.id);
      downloadCSV(safeFile([target.roaster, target.name].filter(Boolean).join(' ')) + '.csv', beanBrewCSV(target, linked));
      const now = new Date().toISOString();
      linked.forEach(r => {
        r.beanName = target.name || ''; r.beanRoaster = target.roaster || '';
        r.roastDate = target.roastDate || ''; r.brewName = composeName(target);
        r.locked = true; r.exportedAt = now;
      });
      target.locked = true; target.exportedAt = now;
      setBrews(brews); setBeans(beans);
    }

    // ── Full JSON backup / restore (survives a browser change or PWA reinstall) ──
    function exportJSON() {
      const data = { app: 'black-magic', version: 1, exportedAt: new Date().toISOString(), beans: getBeans(), brews: getBrews() };
      downloadCSV('black-magic-backup.json', JSON.stringify(data, null, 2), 'application/json;charset=utf-8;');
    }
    function importJSON(text) {
      let data;
      try { data = JSON.parse(text); } catch (_) { alert('That doesn’t look like a Black Magic backup file.'); return; }
      if (!data || !Array.isArray(data.beans) || !Array.isArray(data.brews)) {
        alert('That doesn’t look like a Black Magic backup file.'); return;
      }
      if (!confirm('Restore ' + data.beans.length + ' beans and ' + data.brews.length + ' brews? This REPLACES all current data on this device.')) return;
      setBeans(data.beans); setBrews(data.brews);
      if (shownData === 'beans') renderBeanHistory(); else renderHistory();
      alert('Restored ' + data.beans.length + ' beans and ' + data.brews.length + ' brews.');
    }
    function downloadCSV(filename, text, mime) {
      const blob = new Blob([text], { type: mime || 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }
    // Generic EXPORT = a full dump of BOTH datasets (no locking; re-runnable). Two
    // files → your two spreadsheet sheets. Staggered so iOS doesn't drop the 2nd.
    $('btn-export').addEventListener('click', () => {
      downloadCSV('brews.csv', brewsToCSV());
      setTimeout(() => downloadCSV('beans.csv', beansToCSV()), 700);
      const btn = $('btn-export');
      const orig = btn.textContent;
      btn.textContent = 'exported ✓';
      setTimeout(() => { btn.textContent = orig; }, 1600);
    });
    $('btn-backup').addEventListener('click', () => {
      exportJSON();
      const btn = $('btn-backup'), orig = btn.textContent;
      btn.textContent = 'saved ✓';
      setTimeout(() => { btn.textContent = orig; }, 1400);
    });
    $('btn-restore').addEventListener('click', () => $('restore-file').click());
    $('restore-file').addEventListener('change', e => {
      const file = e.target.files[0];
      if (file) { const reader = new FileReader(); reader.onload = () => importJSON(reader.result); reader.readAsText(file); }
      e.target.value = '';   // allow re-importing the same file
    });

    // ── Screen navigation (BREW ⇄ BEAN) ──────────────────────────
    let currentScreen = 'brew';
    function showScreen(name) {

    // ── Beans (localStorage) ─────────────────────────────────────
    const BEANS_KEY = 'blackmagic.beans';
    function getBeans() {
      try { return JSON.parse(localStorage.getItem(BEANS_KEY)) || []; }
      catch (e) { return []; }
    }
    function setBeans(arr) { localStorage.setItem(BEANS_KEY, JSON.stringify(arr)); }
    function nextBeanId() {
      const maxId = getBeans().reduce((m, b) => Math.max(m, b.id), 0);
      return Math.max(Date.now(), maxId + 1);
    }

    // Seed lists scraped from the spreadsheet (Café Integral absorbs "Integral";
    // "La Columbe" → "La Colombe"). Sorted alphabetically.
    const SEED = {
      country: ['Blend','Brazil','Burundi','Colombia','Congo','Costa Rica','Ecuador',
        'El Salvador','Ethiopia','Guatemala','Hawaii','Honduras','Indonesia','Jamaica',
        'Kenya','Mexico','Nicaragua','Panama','Peru','Rwanda'],
      roaster: ['Big Island','Café Integral','Desnudo','Devocion','Gardelli','La Cabra',
        'La Colombe','Majano','Parlor','Passenger','Preface','Prodigal','Roasting Plant',
        'Sagebrush','Sey','Tandem','Vigilante','Volcanica'],
      varietal: ['Aji','Bourbon','Bourbon Aji','Caturra','Gesha','Java','Kona Typica',
        'Mejorado','Papayo','Parainema','Peaberry','Pink Bourbon','Red Catuai','Rosado',
        'SL28','SL34','Sidra','Sudan Rume','Tabi','Typica','Wush Wush','Yellow Caturra'],
      process: ['Washed','Natural','Honey','Anaerobic','Anaerobic Natural',
        'Carbonic Maceration','Wet Hulled','Hybrid']
    };

    // Options = seed ∪ values already used in saved beans (living list)
    function optionsFor(field, seed) {
      const set = new Set(seed);
      getBeans().forEach(b => { const v = (b[field] || '').trim(); if (v) set.add(v); });
      return [...set].sort((a, b) => a.localeCompare(b));
    }
    // Custom autocomplete dropdown anchored under the field (replaces <datalist>,
    // whose native popup mispositioned in embedded webviews). Free text still allowed.
    function attachAutocomplete(input, getOptions) {
      const wrap = input.closest('.ac');
      const list = document.createElement('div');
      list.className = 'ac-list'; list.hidden = true;
      wrap.appendChild(list);
      let active = -1;
      const items = () => [...list.querySelectorAll('.ac-item')];
      const hide = () => { list.hidden = true; };
      function show() {
        const q = input.value.trim().toLowerCase();
        const opts = getOptions().filter(o => o.toLowerCase().includes(q)).slice(0, 40);
        list.innerHTML = ''; active = -1;
        opts.forEach(o => {
          const el = document.createElement('div');
          el.className = 'ac-item'; el.textContent = o;
          el.addEventListener('mousedown', e => { e.preventDefault(); input.value = o; hide(); });
          list.appendChild(el);
        });
        list.hidden = opts.length === 0;
      }
      input.addEventListener('focus', show);
      input.addEventListener('input', show);
      input.addEventListener('blur', () => setTimeout(hide, 150));
      input.addEventListener('keydown', e => {
        const it = items();
        if (list.hidden || !it.length) return;
        if (e.key === 'ArrowDown') { e.preventDefault(); active = Math.min(active + 1, it.length - 1); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); active = Math.max(active - 1, 0); }
        else if (e.key === 'Enter' && active >= 0) { e.preventDefault(); input.value = it[active].textContent; hide(); return; }
        else if (e.key === 'Escape') { hide(); return; }
        else return;
        it.forEach((el, i) => el.classList.toggle('active', i === active));
        it[active].scrollIntoView({ block: 'nearest' });
      });
    }

    function collectBean() {
      return {
        name: $('bean-name').value.trim(),
        roaster: $('bean-roaster').value.trim(),
        country: $('bean-country').value.trim(),

        bagSize: $('bean-bagsize').value.trim(),

        roasterNotes: $('bean-rnotes').value.trim(),

    function clearBeanForm() {
      ['bean-name','bean-roaster','bean-country','bean-region','bean-process','bean-varietal',
       'bean-roast','bean-bagsize','bean-bagcount','bean-rnotes','bean-mynotes']
        .forEach(id => $(id).value = '');

    let editingBeanId = null;   // null = creating new; otherwise updating in place

    function saveBean() {
      const data = collectBean();
      if (!data.name) { alert('Add a bean name first.'); return null; }
      const beans = getBeans();
      let bean;
      if (editingBeanId) {
        bean = beans.find(b => b.id === editingBeanId);
        if (!bean) { editingBeanId = null; return saveBean(); }   // vanished — save as new
        if (bean.locked) { alert('This bean is locked (already exported) and can’t be edited.'); return null; }
        Object.assign(bean, data, { updatedAt: new Date().toISOString() });  // keeps rating/tastingNote
      } else {
        bean = Object.assign({ id: nextBeanId(), savedAt: new Date().toISOString() }, data);
        beans.push(bean);
      }
      setBeans(beans);
      // Live-reference: editing the selected coffee refreshes the brew bar immediately
      if (currentBean && currentBean.id === bean.id) setBeanBar(bean);
      clearBeanForm();
      editingBeanId = null;
      return bean;
    }
