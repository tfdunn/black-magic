    // ── Selected coffee (links a brew to a bean) ─────────────────
    let currentBean = null;
    const composeName = b => [b.roaster, b.name].map(x => (x || '').trim()).filter(Boolean).join(' ') || 'Untitled coffee';
    function setBeanBar(bean) {
      currentBean = bean || null;
      const bar = $('bean-bar');
      // Bean★ always shows the selected bean's current stored rating
      let br = '';
      if (currentBean && currentBean.id) {
        const stored = getBeans().find(b => b.id === currentBean.id);
        br = (stored && stored.rating) || currentBean.rating || '';
        currentBean.rating = br;
      }
      $('bean-rating').value = br;
      renderField('bean-rating');
      // Bean note: prefill the evolving tasting note stored on the bean
      let bn = '';
      if (currentBean && currentBean.id) {
        const stored = getBeans().find(b => b.id === currentBean.id);
        bn = (stored && stored.tastingNote) || currentBean.tastingNote || '';
        currentBean.tastingNote = bn;
      }
      $('notes-bean').value = bn;
      growNotes();
      if (currentBean) {
        $('bb-name').textContent = composeName(currentBean);
        $('bb-roast').textContent = currentBean.roastDate ? 'roast ' + fmtDateShort(currentBean.roastDate) : '';
        bar.classList.add('has-bean');
      } else {
        $('bb-name').textContent = 'Select a coffee';
        $('bb-roast').textContent = '';
        bar.classList.remove('has-bean');
      }
    }
    function selectBean(bean) {
      setBeanBar(bean);
      saveDraft();
      closeHistory();
      showScreen('brew');
    }
    // Tap the coffee bar → open the Bean tab (same action as the Bean nav button);
    // pick a coffee there by tapping it in the list.
    $('bean-bar').addEventListener('click', () => showScreen('bean'));

    function fmtDateShort(ymd) {
      const dt = new Date(ymd + 'T00:00:00');
      return isNaN(dt) ? ymd
        : dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    // Scroll-safe long-press for list cards: no preventDefault (so the list still
    // scrolls), and any finger movement cancels both the hold and the tap.
    function bindLongPress(el, { onTap, onHold, holdMs = 500 }) {
      let timer = null, fired = false, sx = 0, sy = 0, moved = false;
      el.addEventListener('pointerdown', e => {
        fired = false; moved = false; sx = e.clientX; sy = e.clientY;
        el.classList.add('holding');
        timer = setTimeout(() => { timer = null; fired = true; el.classList.remove('holding'); onHold && onHold(); }, holdMs);
      });
      el.addEventListener('pointermove', e => {
        if (!timer && !moved) return;
        if (Math.abs(e.clientX - sx) > 10 || Math.abs(e.clientY - sy) > 10) {
          moved = true;
          if (timer) { clearTimeout(timer); timer = null; }
          el.classList.remove('holding');
        }
      });
      el.addEventListener('pointerup', () => {
        if (timer) { clearTimeout(timer); timer = null; }
        el.classList.remove('holding');
        if (!fired && !moved && onTap) onTap();
      });
      el.addEventListener('pointercancel', () => {
        if (timer) { clearTimeout(timer); timer = null; }
        el.classList.remove('holding');
      });
    }

    // mode: 'browse' (history overlay — expand, brew-this, delete) |
    // 'manage' (bean tab list — tap selects the coffee, hold → Edit/Export/Delete)
    function renderBeanHistory(mode = 'browse', listEl = $('history-list')) {
      const list = listEl;
      const beans = getBeans().sort((a, b) => b.id - a.id);
      list.innerHTML = '';
      if (!beans.length) {
        list.innerHTML = '<div class="history-empty">No saved beans yet.</div>';
        return;
      }
      beans.forEach(b => {
        const card = document.createElement('div');
        card.className = 'brew-card' + (b.locked ? ' locked' : '');
        const roast = b.roastDate ? fmtDateShort(b.roastDate) : '—';
        const bag = b.bagSize ? (b.bagSize + ' g' + (b.bagCount ? ' × ' + b.bagCount : '')) : '—';
        card.innerHTML = `
          <div class="bc-top">
            <span class="bc-name"></span>
            <span class="bc-date"></span>
          </div>
          <div class="bc-stats"></div>
          <div class="bc-detail">
            <div class="bc-grid">
              <div class="row"><span class="k">Roaster</span><span class="v v-roaster"></span></div>
              <div class="row"><span class="k">Country</span><span class="v v-country"></span></div>
              <div class="row"><span class="k">Region</span><span class="v v-region"></span></div>
              <div class="row"><span class="k">Process</span><span class="v v-process"></span></div>
              <div class="row"><span class="k">Varietal</span><span class="v v-varietal"></span></div>
              <div class="row"><span class="k">Roast</span><span>${roast}</span></div>
              <div class="row"><span class="k">Bag</span><span>${bag}</span></div>
              <div class="row"><span class="k">Bean★</span><span>${b.rating || '—'}</span></div>
            </div>
            <div class="bc-notes" hidden></div>
            <div class="bc-actions"><button class="bc-brew">brew this</button></div>
            <button class="bc-delete-link">delete bean</button>
          </div>`;
        card.querySelector('.bc-name').textContent = b.name || 'Untitled bean';
        card.querySelector('.bc-date').textContent = b.locked ? 'exported' : 'roast ' + roast;
        if (b.locked) card.querySelector('.bc-date').classList.add('bc-lock');
        card.querySelector('.bc-stats').textContent =
          [b.roaster, [b.country, b.process].filter(Boolean).join(' · ')]
            .filter(Boolean).join(' · ') || '—';
        card.querySelector('.v-roaster').textContent = b.roaster || '—';
        card.querySelector('.v-country').textContent = b.country || '—';
        card.querySelector('.v-region').textContent = b.region || '—';
        card.querySelector('.v-process').textContent = b.process || '—';
        card.querySelector('.v-varietal').textContent = b.varietal || '—';
        if (b.roasterNotes) {
          const n = card.querySelector('.bc-notes');
          n.textContent = b.roasterNotes;
          n.hidden = false;
        }

        if (mode === 'manage') {
          // Tap selects this coffee for the next brew; hold 2s → Edit / Export / Delete.
          // No expand — bean details live on the Edit screen.
          card.querySelector('.bc-actions').remove();
          card.querySelector('.bc-delete-link').remove();
          bindLongPress(card, {
            onTap: () => selectBean(b),
            onHold: () => openBeanActions(b)
          });
        } else {  // browse
          card.addEventListener('click', e => {
            if (e.target.closest('.bc-actions') || e.target.closest('.bc-delete-link')) return;
            card.classList.toggle('expanded');
          });
          card.querySelector('.bc-brew').addEventListener('click', () => selectBean(b));
          card.querySelector('.bc-delete-link').addEventListener('click', () => {
            if (!confirm('Delete this bean permanently? This is rarely needed and cannot be undone.')) return;
            setBeans(getBeans().filter(x => x.id !== b.id));
            renderBeanHistory('browse');
          });
        }
        list.appendChild(card);
      });
    }

    // ── Service worker (offline + installable; no-op on insecure origins) ──
    // Self-updating: a new SW skipWaiting()s + claims clients → 'controllerchange'
    // fires → we reload once to show the latest version. We also re-check for a
    // new SW whenever the app regains focus, so reopening it pulls updates.
    if ('serviceWorker' in navigator) {
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => {
          reg.update();
          document.addEventListener('visibilitychange', () => {
            if (!document.hidden) reg.update();
          });
        }).catch(() => {});
      });
    }

    // ── Init ─────────────────────────────────────────────────────
    attachAutocomplete($('bean-country'), () => optionsFor('country', SEED.country));
    attachAutocomplete($('bean-roaster'), () => optionsFor('roaster', SEED.roaster));
    attachAutocomplete($('bean-varietal'), () => optionsFor('varietal', SEED.varietal));
    attachAutocomplete($('bean-process'), () => optionsFor('process', SEED.process));
    $('bagsize-chips').addEventListener('click', e => {
      const g = e.target.dataset.g; if (g) $('bean-bagsize').value = g;
    });
    setBeanBar(null);
    showScreen('brew');
    $('notes-brew').addEventListener('input', () => { growNotes(); saveDraft(); });
    $('notes-bean').addEventListener('input', () => { growNotes(); saveDraft(); });
    loadDraft();              // restore an unsaved brew from a previous session, if any
    renderAllFields();
    growNotes();
    updateButtonLabel();
    recalcSchedule();
    render(0);
    requestAnimationFrame(tick);
  </script>
</body>
</html>
