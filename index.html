<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Black Magic</title>

  <!-- PWA / installable -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#ffffff">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Black Magic">
  <link rel="apple-touch-icon" href="icon-180.png">
  <style>
    /* ── Design tokens (from Claude Design handoff) ── */
    :root {
      --ink:       #0B0B0C;              /* primary text, ticks, save bg, borders */
      --secondary: rgba(60,60,67,0.60);  /* labels, date, selector, timer m:ss */
      --tertiary:  rgba(60,60,67,0.34);  /* units, placeholders, chevron */
      --hairline:  rgba(60,60,67,0.13);  /* separators / grid gaps */
      --accent:    #9A5A2B;              /* warm roasted amber — the one accent */
      --font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro',
              'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: var(--font);
      background: #ececef;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .app {
      background: #fff;
      width: 100%;
      max-width: 440px;
      min-height: 100dvh;
      padding: max(12px, env(safe-area-inset-top)) 20px max(14px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 0;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
    }

    /* ── Header ── */
    .header {
      text-align: center;
      padding: 2px 0 10px;
    }

    .header h1 {
      font-size: 23px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--ink);
      line-height: 1.1;
    }

    .header .date {
      font-size: 12.5px;
      color: var(--secondary);
      margin-top: 4px;
      letter-spacing: 0.1px;
    }

    .brew-name {
      font-size: 15px;
      font-weight: 500;
      color: #000;
      text-align: center;
      padding: 10px 0 8px;
      border-bottom: 1px solid var(--hairline);
    }

    /* ── Stats Grid ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5px;                       /* gaps render as hairline separators */
      background: var(--hairline);
      border-bottom: 0.5px solid var(--hairline);
    }

    .stats-grid .stat-cell {
      background: #fff;
      padding: 13px 6px 14px;
      text-align: center;
    }

    .stat-cell .label {
      font-size: 10px;
      font-weight: 600;
      color: var(--secondary);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      display: block;
      margin-bottom: 5px;
      white-space: nowrap;   /* keep every metric label on one line */
    }

    .stat-cell .value {
      font-size: 21px;
      font-weight: 600;
      color: var(--ink);
      display: block;
      line-height: 1;
      letter-spacing: -0.4px;
    }

    /* ── Editable stat inputs ── */
    .value-input {
      font-size: 21px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.4px;
      background: transparent;
      border: none;
      border-bottom: 1px solid transparent;
      text-align: center;
      text-align-last: center; /* keeps <select> text centred */
      width: 100%;
      padding: 0;
      line-height: 1;
      font-family: inherit;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      display: block;
    }

    .value-input:focus {
      outline: none;
      border-bottom-color: var(--accent);
    }

    /* Hide number spinners */
    .value-input[type=number]::-webkit-inner-spin-button,
    .value-input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    .value-input[type=number] { -moz-appearance: textfield; }

    /* Cells with a unit suffix (%, ml) */
    .unit-wrap {
      display: flex;
      align-items: baseline;
      justify-content: center;
    }

    .unit-wrap .value-input {
      width: 3ch;
    }

    .unit-wrap .value-input.wide {
      width: 4ch;   /* brew target can be 4 digits */
    }

    .unit-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--tertiary);
      line-height: 1.1;
      margin-left: 2px;
    }

    /* Agitate: a little extra gap between the number and its word */
    #agitate-word { margin-left: 5px; }

    /* Agitate: bold number + small grey word, backed by a transparent native
       <select> so the iOS picker still works. */
    .select-wrap { position: relative; }
    .select-wrap .value {
      font-size: 21px; font-weight: 600; color: var(--ink);
      letter-spacing: -0.4px; line-height: 1;
    }
    .select-overlay {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      opacity: 0; border: none; background: none;
      font-family: inherit; font-size: 16px; cursor: pointer;
      -webkit-appearance: none; appearance: none;
    }

    /* ── Timer Area ── */
    .timer-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 0 2px;
    }

    .timer-circle-wrap {
      position: relative;
      width: 235px;
      height: 235px;
      margin: 0 auto 2px;
      cursor: pointer;           /* whole dial is the start/stop/reset tap target */
    }
    .timer-circle-wrap:active { opacity: 0.92; }

    .timer-circle-wrap svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* Clock strokes — progress arc is dark grey for the first 4 min, black past
       it (colour set per-frame in render()); the sweep hand is amber. */
    #timer-svg .t-track { stroke: rgba(60,60,67,0.10); }
    #timer-svg #t-arc   { stroke: #555; transition: stroke-dashoffset 0.1s linear, stroke 0.25s linear; }
    #timer-svg #t-hand  { stroke: var(--accent); }

    .timer-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .pour-number {
      font-size: 54px;
      font-weight: 700;
      color: var(--ink);
      line-height: 0.9;
      letter-spacing: -2px;
      font-variant-numeric: tabular-nums;
    }

    .pour-unit {
      font-size: 13px;
      font-weight: 500;
      color: var(--tertiary);
      margin-top: 2px;
    }

    /* status symbol under the pour target: ▶ start / ⏸ stop / ↺ reset (light-grey SVG) */
    .pour-sym {
      color: var(--tertiary);
      margin-top: 3px;
      line-height: 0;
      display: flex;
    }
    .pour-sym svg { width: 26px; height: 26px; display: block; }

    /* ── Bottom Stats Row ── */
    .bottom-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5px;
      background: var(--hairline);
      border-top: 0.5px solid var(--hairline);
      border-bottom: 0.5px solid var(--hairline);
      margin-top: 6px;
    }

    .bottom-stat {
      background: #fff;
      text-align: center;
      padding: 13px 6px 14px;
    }

    .bottom-stat .label {
      font-size: 10px;
      font-weight: 600;
      color: var(--secondary);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      display: block;
      margin-bottom: 5px;
    }

    .bottom-stat .value {
      font-size: 21px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.4px;
      display: block;
    }

    /* TIME +/−, TDS + Rating are the accented (amber), editable metrics */
    #time-val, #tds, #rating { color: var(--accent); }
    #t-timer { color: var(--ink); }   /* live elapsed — black; amber is reserved for editable results */

    /* Time cell with +/- */
    .time-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .time-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 1px;
    }

    .time-controls .value {
      font-size: 16px;
      font-weight: 700;
      color: #000;
      min-width: 18px;
      text-align: center;
    }

    .btn-adj {
      background: none;
      border: none;
      font-size: 17px;
      color: #000;
      cursor: pointer;
      line-height: 1;
      padding: 0 2px;
      font-family: inherit;
    }

    /* ── Notes ── */
    .notes-section {
      margin-top: 4px;
    }

    .notes-label {
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: 0.02em;
      padding: 14px 0 8px;
      border-top: 0.5px solid var(--hairline);
    }

    .notes-input {
      display: block;
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      overflow: hidden;
      font-size: 16px;   /* ≥16px stops iOS auto-zoom on focus */
      color: var(--ink);
      line-height: 1.4;
      padding: 2px 0 4px;
      font-family: inherit;
      background: transparent;
      text-align: center;
    }

    .notes-input::placeholder { color: var(--tertiary); }

    /* ── Header history button ── */
    .header { position: relative; }
    .history-btn {
      position: absolute;
      top: 0; right: 0;
      background: none;
      border: none;
      font-size: 16px;
      color: var(--accent);
      cursor: pointer;
      font-family: inherit;
      font-weight: 400; letter-spacing: -0.2px;
      padding: 4px 0;
    }
    .history-btn:active { opacity: 0.45; }

    /* ── Editable brew name ── */
    input.brew-name {
      width: 100%;
      background: transparent;
      font-family: inherit;
      outline: none;
      border: none;
      border-bottom: 1px solid #e8e8e8;
    }
    input.brew-name:focus { border-bottom-color: #bbb; }

    /* ── Save button ── */
    .save-row {
      display: flex;
      justify-content: center;
      margin-top: 16px;
    }
    .btn-save {
      background: var(--ink);
      color: #fff;
      border: 1.5px solid var(--ink);
      border-radius: 999px;
      font-size: 17px;
      font-weight: 600;
      padding: 15px 44px;
      cursor: pointer;
      letter-spacing: -0.2px;
      font-family: inherit;
      transition: transform .12s ease, opacity .15s;
    }
    .btn-save:active { transform: scale(0.97); opacity: 0.9; }
    .btn-save.saved { background: #fff; color: var(--ink); }

    /* ── History overlay ── */
    .history-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.25);
      display: none;
      justify-content: center;
      z-index: 10;
    }
    .history-overlay.open { display: flex; }
    .history-panel {
      background: #fff;
      width: 100%;
      max-width: 390px;
      height: 100%;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.25s ease;
    }
    .history-overlay.open .history-panel { transform: translateX(0); }
    .history-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 20px 12px;
      border-bottom: 1px solid #e8e8e8;
    }
    .history-head h2 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .history-close {
      background: none;
      border: none;
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      color: #000;
      font-family: inherit;
      padding: 0 2px;
    }
    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0 24px;
    }
    .history-empty {
      text-align: center;
      color: #bbb;
      font-size: 13px;
      padding: 48px 20px;
    }
    .brew-card {
      padding: 12px 20px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
    }
    .brew-card:active { background: #f7f7f7; }
    .brew-card .bc-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .brew-card .bc-name { font-size: 14px; font-weight: 600; color: #000; }
    .brew-card .bc-date {
      font-size: 10px;
      color: #aaa;
      white-space: nowrap;
      margin-left: 8px;
    }
    .brew-card .bc-stats {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
      font-variant-numeric: tabular-nums;
    }
    .brew-card .bc-detail { display: none; margin-top: 12px; }
    .brew-card.expanded .bc-detail { display: block; }
    .bc-detail .bc-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 5px 18px;
    }
    .bc-detail .bc-grid .row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #000;
      font-variant-numeric: tabular-nums;
    }
    .bc-detail .bc-grid .row .k { color: #999; }
    .bc-detail .bc-notes {
      font-size: 12px;
      color: #555;
      margin-top: 10px;
      font-style: italic;
    }
    .bc-detail .bc-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }
    .bc-actions button {
      flex: 1;
      font-size: 11px;
      padding: 6px 0;
      border: 1px solid #000;
      border-radius: 16px;
      background: none;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.3px;
    }
    .bc-actions .bc-delete { border-color: #c00; color: #c00; }

    /* ── Screen nav toggle (top-left, mirrors history) ── */
    .nav-btn {
      position: absolute;
      top: 0; left: 0;
      background: none; border: none;
      font-size: 16px; color: var(--accent);
      cursor: pointer; font-family: inherit;
      font-weight: 400; letter-spacing: -0.2px;
      padding: 4px 0;
    }
    .nav-btn:active { opacity: 0.45; }

    /* ── Screens ── */
    .screen[hidden] { display: none; }

    /* ── Bean screen ── */
    input.bean-name {
      width: 100%; font-size: 20px; font-weight: 600; color: #000;
      text-align: center; background: transparent; border: none;
      border-bottom: 1px solid #e8e8e8; outline: none; font-family: inherit;
      padding: 14px 0 6px;
    }
    input.bean-name:focus { border-bottom-color: #bbb; }
    input.bean-name::placeholder { color: #ccc; font-weight: 500; }

    input.roaster {
      width: 100%; font-size: 16px; font-weight: 500; color: #555;
      text-align: center; background: transparent; border: none;
      border-bottom: 1px solid #e8e8e8; outline: none; font-family: inherit;
      padding: 8px 0 10px;
    }
    input.roaster:focus { border-bottom-color: #bbb; }
    input.roaster::placeholder { color: #ccc; }

    .bean-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      border-bottom: 1px solid #e8e8e8;
    }
    .bean-grid.one-col { grid-template-columns: 1fr; }
    .bean-cell {
      padding: 9px 6px; text-align: center;
      border-right: 1px solid #e8e8e8; border-top: 1px solid #e8e8e8;
    }
    .bean-grid .bean-cell:nth-child(-n+2) { border-top: none; }
    .bean-grid .bean-cell:nth-child(2n) { border-right: none; }
    .bean-grid.one-col .bean-cell { border-right: none; border-top: none; }
    .bean-cell .label {
      font-size: 9px; font-weight: 600; color: #888; text-transform: uppercase;
      letter-spacing: 0.4px; display: block; margin-bottom: 4px;
    }
    .value-input::placeholder { color: #ccc; font-weight: 500; }
    .bean-date { font-size: 16px; width: 100%; min-height: 34px; padding: 5px 0; }

    .text-field { padding: 11px 0 9px; border-bottom: 1px solid #e8e8e8; }
    .text-field .label {
      font-size: 9px; font-weight: 600; color: #888; text-transform: uppercase;
      letter-spacing: 0.4px; display: block; margin-bottom: 5px; text-align: center;
    }
    .text-field input {
      width: 100%; border: none; outline: none; background: transparent;
      font-family: inherit; font-size: 16px; color: #555; text-align: center;
    }
    .text-field input::placeholder { color: #ccc; }

    /* ── Selected-coffee bar (BREW screen) ── */
    .bean-bar {
      width: 100%;
      background: transparent;
      border: none;
      border-top: 0.5px solid var(--hairline);
      border-bottom: 0.5px solid var(--hairline);
      font-family: inherit;
      padding: 13px 0 12px;
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      transition: background .15s;
    }
    .bean-bar:active { background: rgba(60,60,67,0.04); }
    .bean-bar-row { display: flex; align-items: center; gap: 8px; }
    .bean-bar-name { font-size: 17px; font-weight: 500; color: var(--ink); letter-spacing: -0.2px; }
    .bean-bar:not(.has-bean) .bean-bar-name { color: var(--secondary); }
    .bean-bar-chev { color: var(--tertiary); flex: none; }
    .bean-bar-roast { font-size: 11px; color: var(--tertiary); letter-spacing: 0.2px; }

    /* ── Two-button save row (BEAN input) ── */
    .save-row.two { gap: 10px; }
    .btn-save.secondary { background: #fff; color: #000; }
    .btn-save.secondary:active { background: #f0f0f0; }

    /* ── Bean-card actions: prominent "brew this", demoted delete ── */
    .bc-actions .bc-brew { flex: 1; background: #000; color: #fff; border-color: #000; }
    .bc-delete-link {
      display: block; margin: 12px auto 0;
      background: none; border: none;
      font-size: 10px; color: #caa; cursor: pointer;
      font-family: inherit; letter-spacing: 0.3px; text-decoration: underline;
    }
    .bc-delete-link:active { color: #c00; }

    /* ── Custom autocomplete dropdown (replaces native <datalist>) ── */
    .ac { position: relative; width: 100%; }
    .ac-list {
      position: absolute; top: 100%; left: 0; right: 0;
      background: #fff; border: 1px solid #ddd;
      max-height: 168px; overflow-y: auto; z-index: 30;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.10);
      text-align: left;
    }
    .ac-list[hidden] { display: none; }
    .ac-item {
      padding: 8px 12px; font-size: 13px; color: #000;
      cursor: pointer; white-space: nowrap;
    }
    .ac-item.active, .ac-item:hover { background: #f0f0f0; }

    /* ── History panel export action ── */
    .hh-actions { display: flex; align-items: center; gap: 14px; }
    .history-export {
      background: none; border: none; font-family: inherit;
      font-size: 12px; font-weight: 600; letter-spacing: 0.6px;
      color: #888; cursor: pointer; text-transform: uppercase;
    }
    .history-export:active { color: #000; }
  </style>
</head>
<body>
  <div class="app">

   <!-- ══ BREW SCREEN ══ -->
   <section id="screen-brew" class="screen">

    <!-- Header -->
    <div class="header">
      <button class="nav-btn" id="btn-to-bean">Bean</button>
      <h1>Black Magic</h1>
      <div class="date" id="date-display"></div>
      <button class="history-btn" id="btn-history">History</button>
    </div>

    <!-- Selected coffee (tap to choose a bean) -->
    <button class="bean-bar" id="bean-bar" type="button">
      <span class="bean-bar-row">
        <span class="bean-bar-name" id="bb-name">Select a coffee</span>
        <svg class="bean-bar-chev" width="12" height="7" viewBox="0 0 12 7" aria-hidden="true"><path d="M1 1l5 5 5-5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
      <span class="bean-bar-roast" id="bb-roast"></span>
    </button>

    <!-- Stats Grid -->
    <div class="stats-grid">
      <div class="stat-cell">
        <span class="label">Dose</span>
        <div class="unit-wrap">
          <input class="value-input wide" type="number" id="dose"
            min="0" max="99" step="0.1" value="24.8" inputmode="decimal">
          <span class="unit-label">g</span>
        </div>
      </div>
      <div class="stat-cell">
        <span class="label">Grind</span>
        <div class="unit-wrap">
          <input class="value-input" type="number" id="grind"
            min="0" max="99" step="0.1" value="8" inputmode="decimal">
          <span class="unit-label">#</span>
        </div>
      </div>
      <div class="stat-cell">
        <span class="label">Agitate</span>
        <div class="unit-wrap select-wrap">
          <span class="value" id="agitate-num">2</span>
          <span class="unit-label" id="agitate-word">low</span>
          <select class="select-overlay" id="agitate" aria-label="Agitate">
            <option value="0">0 (none)</option>
            <option value="1">1 (min)</option>
            <option value="2" selected>2 (low)</option>
            <option value="3">3 (mid)</option>
            <option value="4">4 (high)</option>
          </select>
        </div>
      </div>
      <div class="stat-cell">
        <span class="label">Contact</span>
        <select class="value-input" id="contact">
          <option value="60">1:00</option>
          <option value="90">1:30</option>
          <option value="120">2:00</option>
          <option value="150">2:30</option>
          <option value="180">3:00</option>
          <option value="210">3:30</option>
          <option value="240">4:00</option>
          <option value="270" selected>4:30</option>
          <option value="300">5:00</option>
          <option value="330">5:30</option>
          <option value="360">6:00</option>
          <option value="390">6:30</option>
          <option value="420">7:00</option>
          <option value="450">7:30</option>
          <option value="480">8:00</option>
          <option value="510">8:30</option>
          <option value="540">9:00</option>
          <option value="570">9:30</option>
          <option value="600">10:00</option>
        </select>
      </div>
      <div class="stat-cell">

    <!-- Timer -->

            transform="rotate(-90 100 100)"/>
          <!-- Tick marks: fixed 4-min face (8 × 30s), drawn by JS -->

          <!-- Floating second hand: one sweep = one 30s pour cycle -->

  <!-- History overlay -->
  <div class="history-overlay" id="history-overlay">
    <div class="history-panel">
      <div class="history-head">
        <h2 id="history-title">History</h2>
        <div class="hh-actions">
          <button class="history-export" id="btn-export">export</button>
          <button class="history-close" id="btn-history-close">&times;</button>
        </div>
      </div>
      <div class="history-list" id="history-list"></div>
    </div>
  </div>

  <script>
    // ── Date display (live — updates while open and on re-focus) ──
    const dateOpts = { day: 'numeric', month: 'long', year: 'numeric' };
    function updateClock() {
      const d = new Date();
      const t = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }).toLowerCase();
      document.getElementById('date-display').textContent =
        d.toLocaleDateString('en-US', dateOpts) + '  ' + t;
    }
    updateClock();
    setInterval(updateClock, 30000);
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) return;
      updateClock();
      if (audioCtx) audioCtx.resume();   // re-prime audio after returning from background (iOS)
    });

    // ── TIME +/- display ─────────────────────────────────────────
    const timeDisplay = document.getElementById('time-val');

    // Status symbol shown under the pour target — inline SVG (grey, via
    // currentColor) so it renders as a crisp glyph, not an iOS emoji box.
    function setTimerLabel(label) {
      const ICONS = {
        start: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>',
        stop:  '<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="6" y="5" width="4" height="14" rx="1" fill="currentColor"/><rect x="14" y="5" width="4" height="14" rx="1" fill="currentColor"/></svg>',
        reset: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12a9 9 0 1 0 2.6-6.4"/><path d="M3 3v4.5h4.5"/></svg>'
      };
      const key = label === 'stop' ? 'stop' : label === 'reset' ? 'reset' : 'start';
      const e = document.getElementById('t-sym');
      if (e) e.innerHTML = ICONS[key];
    }

    // Notes textarea grows to fit its content
    function growNotes() {
      const el = document.getElementById('notes');
      el.style.height = 'auto';
      el.style.height = el.scrollHeight + 'px';
    }

    // Agitate: keep the visible number + small grey word synced to the <select>
    const AGITATE_WORDS = { '0': 'none', '1': 'min', '2': 'low', '3': 'mid', '4': 'high' };
    function syncAgitate() {
      const v = document.getElementById('agitate').value;
      document.getElementById('agitate-num').textContent = v;
      document.getElementById('agitate-word').textContent = AGITATE_WORDS[v] || '';
    }
    document.getElementById('agitate').addEventListener('change', syncAgitate);

    // ── Audio (Web Audio API, created on first user gesture) ─────
    let audioCtx = null;

    function getAudio() {
      if (!audioCtx || audioCtx.state === 'closed')
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state !== 'running') audioCtx.resume();   // covers 'suspended' + iOS 'interrupted'
      return audioCtx;
    }

    // Keep audio unlocked across gestures AND app re-focus. iOS suspends the
    // AudioContext when backgrounded and needs a resume on the next interaction,
    // so we re-prime on every gesture (cheap) instead of just once.
    // NOTE: the physical Ring/Silent switch can still mute Web Audio on iOS.
    let audioPrimed = false;
    function unlockAudio() {
      const ctx = getAudio();
      if (!audioPrimed) {
        try {
          const src = ctx.createBufferSource();
          src.buffer = ctx.createBuffer(1, 1, 22050);
          src.connect(ctx.destination);
          src.start(0);
          audioPrimed = true;
        } catch (e) {}
      }
    }
    ['touchend', 'pointerdown'].forEach(ev => window.addEventListener(ev, unlockAudio));

    // Schedule a tone on the AudioContext's own clock. Scheduling ahead of time
    // (rather than firing oscillators from later setTimeouts) is the key to
    // reliable iOS playback — the countdown queues all its tones at gesture time.
    function tone(freq, dur, when, vol = 0.5) {
      try {
        const ctx = getAudio();
        const t0 = (when == null ? ctx.currentTime : when);
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(vol, t0);
        gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
        osc.start(t0);
        osc.stop(t0 + dur);
        return osc;
      } catch (e) { return null; }
    }
    function beep(freq, dur, vol = 0.5) { return tone(freq, dur, null, vol); }

    // ── Pour schedule (dynamic — rebuilt from CONTACT, DECAY, BREW TARGET) ──
    // Geometric decay series: pour_i = x · r^i, where r = DECAY/100
    // Sum of n pours = BREW_TARGET  →  x = BREW_TARGET · (1−r) / (1−r^n)
    const CYCLE_SECS = 30;
    const CLOCK_SCOPE = 240; // timer face always spans 4 minutes; wraps if brew is longer
    let POUR_TARGETS = [];
    let TOTAL = 270; // updated by recalcSchedule()

    function recalcSchedule() {
      const contactSecs = parseInt(document.getElementById('contact').value) || 270;
      const brewTarget  = Math.round(parseFloat(document.getElementById('brew-target').value) || 350);
      const decayPct    = parseFloat(document.getElementById('decay').value);
      const r = decayPct / 100;
      const n = Math.max(1, Math.round(contactSecs / CYCLE_SECS));
      TOTAL = n * CYCLE_SECS;

      const x = Math.abs(r - 1) < 0.001
        ? brewTarget / n                              // equal distribution (DECAY = 100%)
        : brewTarget * (1 - r) / (1 - Math.pow(r, n));

      POUR_TARGETS = [];
      for (let i = 0; i < n; i++) {
        const cumul = Math.abs(r - 1) < 0.001
          ? Math.round(x * (i + 1))
          : Math.round(x * (1 - Math.pow(r, i + 1)) / (1 - r));
        POUR_TARGETS.push(cumul);
      }
      POUR_TARGETS[POUR_TARGETS.length - 1] = brewTarget; // exact final target

      drawTicks();
    }

    function pourTarget(s) {
      if (!POUR_TARGETS.length) return 0;
      return POUR_TARGETS[Math.min(Math.floor(s / CYCLE_SECS), POUR_TARGETS.length - 1)];
    }

    function fmtTime(s) {
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${String(sec).padStart(2, '0')}`;
    }

    // ── Tick marks — fixed 4-min face, no numeric labels ─────────
    function drawTicks() {
      const g = document.getElementById('t-ticks');
      g.innerHTML = '';
      const ns = 'http://www.w3.org/2000/svg';
      const n = CLOCK_SCOPE / CYCLE_SECS; // 8
      for (let i = 0; i < n; i++) {
        const tickSecs = (i + 1) * CYCLE_SECS;
        const isMinute = tickSecs % 60 === 0;
        const isTop = (i === n - 1);   // 12 o'clock — bold cycle anchor (start/end mark)
        const a = ((i + 1) / n) * 2 * Math.PI - Math.PI / 2;
        const r0 = isTop ? 74 : 77, r1 = isTop ? 90 : (isMinute ? 86 : 82);
        const ln = document.createElementNS(ns, 'line');
        ln.setAttribute('x1', (100 + r0 * Math.cos(a)).toFixed(2));
        ln.setAttribute('y1', (100 + r0 * Math.sin(a)).toFixed(2));
        ln.setAttribute('x2', (100 + r1 * Math.cos(a)).toFixed(2));
        ln.setAttribute('y2', (100 + r1 * Math.sin(a)).toFixed(2));
        ln.setAttribute('stroke', isTop ? 'rgba(60,60,67,0.40)' : isMinute ? 'rgba(60,60,67,0.28)' : 'rgba(60,60,67,0.16)');
        ln.setAttribute('stroke-width', isTop ? '3.4' : isMinute ? '2.8' : '1.3');
        ln.setAttribute('stroke-linecap', 'round');
        g.appendChild(ln);
      }
    }

    // ── Timer state ──────────────────────────────────────────────
    const CIRC = 2 * Math.PI * 93;
    let elapsed = 0, running = false, lastTs = null;
    let inCountdown = false;

    function render(s) {
      const pos = s % CLOCK_SCOPE;
      const arcFrac = (pos === 0 && s > 0) ? 1 : pos / CLOCK_SCOPE;
      const progColor = s >= CLOCK_SCOPE ? '#000' : '#555';   // grey first 4 min, black after
      const arc = document.getElementById('t-arc');
      arc.setAttribute('stroke-dashoffset', (CIRC * (1 - arcFrac)).toFixed(3));
      arc.setAttribute('stroke', progColor);
      const a = ((s % CYCLE_SECS) / CYCLE_SECS) * 2 * Math.PI - Math.PI / 2;
      const hand = document.getElementById('t-hand');   // inner r=50 keeps clear of the center number
      hand.setAttribute('x1', (100 + 50 * Math.cos(a)).toFixed(2));
      hand.setAttribute('y1', (100 + 50 * Math.sin(a)).toFixed(2));
      hand.setAttribute('x2', (100 + 84 * Math.cos(a)).toFixed(2));
      hand.setAttribute('y2', (100 + 84 * Math.sin(a)).toFixed(2));
      if (!inCountdown) document.getElementById('t-ml').textContent = pourTarget(s);
      document.getElementById('t-timer').textContent = fmtTime(s);   // live elapsed (results row)
    }

    function tick(ts) {
      if (running) {
        if (lastTs !== null) {
          const prev = elapsed;
          elapsed = elapsed + (ts - lastTs) / 1000;   // counts up past TOTAL — records long brews
          // Beep at each 30-second pour boundary, but only for scheduled pours
          const cyc = Math.floor(elapsed / CYCLE_SECS);
          if (cyc > Math.floor(prev / CYCLE_SECS) && cyc <= POUR_TARGETS.length) {
            beep(880, 0.18, 0.45);
          }
        }
        lastTs = ts;
      } else {
        lastTs = null;
      }
      render(elapsed);
      requestAnimationFrame(tick);
    }

    // ── 3-second countdown before brew starts ────────────────────
    // Pitches rise G4→A4→C5 to build anticipation; GO tone is G5. All four
    // tones are scheduled on the audio clock at the start gesture, so iOS plays
    // them reliably even though the visual countdown runs off setTimeout.
    let countdownNodes = [];
    function cancelCountdownAudio() {
      countdownNodes.forEach(o => { try { o && o.stop(); } catch (e) {} });
      countdownNodes = [];
    }
    function startCountdown() {
      inCountdown = true;
      setTimerLabel('stop');
      const ctx = getAudio();              // resume/unlock audio on this gesture
      const t0 = ctx.currentTime + 0.06;
      countdownNodes = [];
      [392, 440, 523].forEach((p, i) => countdownNodes.push(tone(p, 0.15, t0 + i, 0.6)));
      countdownNodes.push(tone(784, 0.4, t0 + 3, 0.7)); // G5 "GO"

      let count = 3;
      const step = () => {
        if (!inCountdown) return;
        document.getElementById('t-ml').textContent = count;
        count--;
        if (count > 0) {
          setTimeout(step, 1000);
        } else {
          setTimeout(() => {
            if (!inCountdown) return;
            inCountdown = false;
            elapsed = 0;
            running = true;
            lastTs = null;
            countdownNodes = [];
            render(0);
          }, 1000);
        }
      };
      step();
    }

    // ── Timer reset (zeroes the clock only — NOT TIME +/−, which is preserved
    //    until "new brew" so an evaluated brew isn't lost by an accidental reset) ─
    function resetTimer() {
      inCountdown = false;
      running = false;
      elapsed = 0;
      lastTs = null;
      cancelCountdownAudio();
      setTimerLabel('start');
      render(0);
    }

    // ── Field change → recalc schedule + reset timer ─────────────
    ['contact', 'decay', 'brew-target'].forEach(id => {
      document.getElementById(id).addEventListener('change', () => {
        recalcSchedule();
        resetTimer();
      });
    });

    // ── Timer button: cycles start → stop → reset → start ─────────
    // Affects ONLY the timer (and its TIME +/− output) — never TDS/Rating.
    document.querySelector('.timer-circle-wrap').addEventListener('click', () => {
      if (inCountdown) {                  // press during countdown → cancel
        inCountdown = false;
        cancelCountdownAudio();
        setTimerLabel('start');
        render(0);
      } else if (running) {               // stop → freeze + record TIME +/−
        running = false;
        lastTs = null;
        timeDisplay.value = Math.round(elapsed - TOTAL) - 2; // −2 reaction-time
        setTimerLabel('reset');
      } else if (elapsed > 0) {           // reset → back to zero
        resetTimer();
      } else {                            // start
        startCountdown();
      }
    });

    // ── Brew history (localStorage) ──────────────────────────────
    const STORE_KEY = 'blackmagic.brews';

    function getBrews() {
      try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
      catch (e) { return []; }
    }
    function setBrews(arr) {
      localStorage.setItem(STORE_KEY, JSON.stringify(arr));
    }
    // Strictly increasing, unique id even for saves in the same millisecond
    function nextId() {
      const maxId = getBrews().reduce((m, b) => Math.max(m, b.id), 0);
      return Math.max(Date.now(), maxId + 1);
    }

    const $ = id => document.getElementById(id);

    // Snapshot every field into a record
    function collectRecord() {
      const agitate = $('agitate'), contact = $('contact');
      return {
        id: nextId(),
        savedAt: new Date().toISOString(),
        brewName: currentBean ? composeName(currentBean) : 'Untitled brew',
        beanId: currentBean ? currentBean.id : null,
        beanName: currentBean ? (currentBean.name || '') : '',
        beanRoaster: currentBean ? (currentBean.roaster || '') : '',
        roastDate: currentBean ? (currentBean.roastDate || '') : '',
        dose: $('dose').value,
        grind: $('grind').value,
        agitate: agitate.value,
        agitateText: agitate.selectedOptions[0].text,
        contact: contact.value,
        contactText: contact.selectedOptions[0].text,
        water: $('water').value,
        bloom: $('bloom').value,
        decay: $('decay').value,
        brewTarget: $('brew-target').value,
        timeAdj: $('time-val').value,
        tds: $('tds').value,
        rating: $('rating').value,
        notes: $('notes').value.trim()
      };
    }

    // Write a record back into the live form
    function applyRecord(r) {
      setBeanBar((r.beanId || r.beanName || r.brewName) ? { id: r.beanId || null, name: r.beanName || r.brewName, roaster: r.beanRoaster || '', roastDate: r.roastDate || '' } : null);
      $('dose').value = r.dose;
      $('grind').value = r.grind;
      $('agitate').value = r.agitate;
      $('contact').value = r.contact;
      $('water').value = r.water;
      $('bloom').value = r.bloom;
      $('decay').value = r.decay;
      $('brew-target').value = r.brewTarget;
      $('tds').value = r.tds;
      $('rating').value = r.rating;
      $('notes').value = r.notes;
      growNotes();
      syncAgitate();
      timeDisplay.value = r.timeAdj;
      // Programmatic .value changes don't fire 'change', so reset timer manually
      inCountdown = false;
      running = false;
      elapsed = 0;
      lastTs = null;
      cancelCountdownAudio();
      setTimerLabel('start');
      setBottomButton('save');
      recalcSchedule();
      render(0);
    }

    function fmtSavedAt(iso) {
      const dt = new Date(iso);
      const date = dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      const time = dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }).toLowerCase();
      return `${date} · ${time}`;
    }

    function renderHistory() {
      const list = $('history-list');
      const brews = getBrews().sort((a, b) => b.id - a.id);
      list.innerHTML = '';

      if (!brews.length) {
        list.innerHTML = '<div class="history-empty">No saved brews yet.</div>';
        return;
      }

      brews.forEach(r => {
        const card = document.createElement('div');
        card.className = 'brew-card';
        const dose = r.dose ? r.dose + 'g' : '—';
        const tds = r.tds ? 'TDS ' + r.tds : 'TDS —';
        const rating = r.rating ? '★' + r.rating : '★—';
        card.innerHTML = `
          <div class="bc-top">
            <span class="bc-name"></span>
            <span class="bc-date">${fmtSavedAt(r.savedAt)}</span>
          </div>
          <div class="bc-stats">${dose} · ${tds} · ${rating}</div>
          <div class="bc-detail">
            <div class="bc-grid">
              <div class="row"><span class="k">Roast</span><span>${r.roastDate ? fmtDateShort(r.roastDate) : '—'}</span></div>
              <div class="row"><span class="k">Dose</span><span>${r.dose || '—'} g</span></div>
              <div class="row"><span class="k">Grind</span><span>${r.grind || '—'}</span></div>
              <div class="row"><span class="k">Agitate</span><span>${r.agitateText}</span></div>
              <div class="row"><span class="k">Contact</span><span>${r.contactText}</span></div>
              <div class="row"><span class="k">Water</span><span>${r.water || '—'} F°</span></div>
              <div class="row"><span class="k">Bloom</span><span>${r.bloom || '—'} ml</span></div>
              <div class="row"><span class="k">Decay</span><span>${r.decay || '—'} %</span></div>
              <div class="row"><span class="k">Target</span><span>${r.brewTarget || '—'} ml</span></div>
              <div class="row"><span class="k">Time +/−</span><span>${r.timeAdj}</span></div>
              <div class="row"><span class="k">TDS</span><span>${r.tds || '—'}</span></div>
              <div class="row"><span class="k">Rating</span><span>${r.rating || '—'}</span></div>
            </div>
            ${r.notes ? `<div class="bc-notes">${r.notes.replace(/</g, '&lt;')}</div>` : ''}
            <div class="bc-actions">
              <button class="bc-load">load</button>
              <button class="bc-delete">delete</button>
            </div>
          </div>`;
        card.querySelector('.bc-name').textContent = r.brewName;

        // Tap card toggles detail (ignore taps on the action buttons)
        card.addEventListener('click', e => {
          if (e.target.closest('.bc-actions')) return;
          card.classList.toggle('expanded');
        });
        card.querySelector('.bc-load').addEventListener('click', () => {
          applyRecord(r);
          closeHistory();
        });
        card.querySelector('.bc-delete').addEventListener('click', () => {
          if (!confirm('Delete this brew?')) return;
          setBrews(getBrews().filter(b => b.id !== r.id));
          renderHistory();
        });

        list.appendChild(card);
      });
    }

    let shownData = 'brews';   // which dataset the History panel currently shows (for export)
    function openHistory() {
      if (currentScreen === 'bean') {
        shownData = 'beans';
        $('history-title').textContent = 'Beans';
        renderBeanHistory();
      } else {
        shownData = 'brews';
        $('history-title').textContent = 'Brews';
        renderHistory();
      }
      $('history-overlay').classList.add('open');
    }
    function closeHistory() {
      $('history-overlay').classList.remove('open');
    }

    // Bottom button toggles save ⇄ new.
    //  • "save brew" snapshots the brew to history and changes NOTHING on screen.
    //  • "new brew" then clears the timer + TIME/TDS/Rating for the next cup,
    //    leaving the coffee + recipe in place (for brewing many cups in a row).
    let brewSaved = false;
    function setBottomButton(mode) {        // 'save' | 'new'
      brewSaved = (mode === 'new');
      const btn = $('btn-save');
      btn.textContent = (mode === 'new') ? 'new brew' : 'save brew';
      btn.classList.remove('saved');
    }
    function newBrew() {
      resetTimer();              // clock back to zero
      timeDisplay.value = '';    // TIME +/− blanked ONLY here (on New brew)
      $('tds').value = '';
      $('rating').value = '';
      setBottomButton('save');
    }
    $('btn-save').addEventListener('click', () => {
      if (brewSaved) { newBrew(); return; }
      const brews = getBrews();
      brews.push(collectRecord());
      setBrews(brews);
      const btn = $('btn-save');
      btn.textContent = 'saved ✓';
      btn.classList.add('saved');
      setTimeout(() => setBottomButton('new'), 1200);
    });

    $('btn-history').addEventListener('click', openHistory);
    $('btn-history-bean').addEventListener('click', openHistory);
    $('btn-history-close').addEventListener('click', closeHistory);
    $('history-overlay').addEventListener('click', e => {
      if (e.target === $('history-overlay')) closeHistory();
    });

    // ── CSV export (headers match the spreadsheet; units converted on the way out) ──
    function csvCell(v) {
      if (v === null || v === undefined) v = '';
      v = String(v);
      return /[",\n\r]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v;
    }
    function toCSV(headers, rows) {
      return [headers, ...rows].map(r => r.map(csvCell).join(',')).join('\r\n');
    }
    function csvDateTime(iso) {
      const d = new Date(iso);
      if (isNaN(d)) return '';
      const p = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
    }
    function brewsToCSV() {
      const H = ['Name','Date','Roaster','Dose','Grind','Temp','Time_Aim','Bloom','Pour_Decay','Agitate','Output','Time_Error','TDS','Rating','Comments'];
      const rows = getBrews().sort((a, b) => a.id - b.id).map(r => [
        r.brewName || '',
        csvDateTime(r.savedAt),
        r.beanRoaster || '',
        r.dose || '',
        r.grind || '',
        r.water || '',
        r.contact ? parseInt(r.contact) / 60 : '',                       // seconds → minutes
        r.bloom || '',
        (r.decay !== '' && r.decay != null) ? parseFloat(r.decay) / 100 : '', // percent → fraction
        (r.agitate == null ? '' : r.agitate),
        r.brewTarget || '',
        (r.timeAdj ?? ''),
        r.tds || '',
        r.rating || '',
        r.notes || ''
      ]);
      return toCSV(H, rows);
    }
    function beansToCSV() {
      const H = ['Name','Roaster','Country','Region','Varietal','Process','Roast_Date','Roaster_Notes','Comments'];
      const rows = getBeans().sort((a, b) => a.id - b.id).map(b => [
        b.name || '', b.roaster || '', b.country || '', b.region || '', b.varietal || '',
        b.process || '', b.roastDate || '', b.roasterNotes || '', b.myNotes || ''
      ]);
      return toCSV(H, rows);
    }
    function downloadCSV(filename, text) {
      const blob = new Blob([text], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }
    $('btn-export').addEventListener('click', () => {
      if (shownData === 'beans') downloadCSV('beans.csv', beansToCSV());
      else downloadCSV('brews.csv', brewsToCSV());
      const btn = $('btn-export');
      const orig = btn.textContent;
      btn.textContent = 'exported ✓';
      setTimeout(() => { btn.textContent = orig; }, 1400);
    });

    // ── Screen navigation (BREW ⇄ BEAN) ──────────────────────────
    let currentScreen = 'brew';
    function showScreen(name) {
      currentScreen = name;
      $('screen-brew').hidden = (name !== 'brew');
      $('screen-bean').hidden = (name !== 'bean');
    }
    $('btn-to-bean').addEventListener('click', () => showScreen('bean'));
    $('btn-to-brew').addEventListener('click', () => showScreen('brew'));

    // ── Beans (localStorage) ─────────────────────────────────────
    const BEANS_KEY = 'blackmagic.beans';
    function getBeans() {
      try { return JSON.parse(localStorage.getItem(BEANS_KEY)) || []; }
      catch (e) { return []; }
    }
    function setBeans(arr) { localStorage.setItem(BEANS_KEY, JSON.stringify(arr)); }
    function nextBeanId() {
      const maxId = getBeans().reduce((m, b) => Math.max(m, b.id), 0);
      return Math.max(Date.now(), maxId + 1);
    }

    // Seed lists scraped from the spreadsheet (Café Integral absorbs "Integral";
    // "La Columbe" → "La Colombe"). Sorted alphabetically.
    const SEED = {
      country: ['Blend','Brazil','Burundi','Colombia','Congo','Costa Rica','Ecuador',
        'El Salvador','Ethiopia','Guatemala','Hawaii','Honduras','Indonesia','Jamaica',
        'Kenya','Mexico','Nicaragua','Panama','Peru','Rwanda'],
      roaster: ['Big Island','Café Integral','Desnudo','Devocion','Gardelli','La Cabra',
        'La Colombe','Majano','Parlor','Passenger','Preface','Prodigal','Roasting Plant',
        'Sagebrush','Sey','Tandem','Vigilante','Volcanica'],
      varietal: ['Aji','Bourbon','Bourbon Aji','Caturra','Gesha','Java','Kona Typica',
        'Mejorado','Papayo','Parainema','Peaberry','Pink Bourbon','Red Catuai','Rosado',
        'SL28','SL34','Sidra','Sudan Rume','Tabi','Typica','Wush Wush','Yellow Caturra']
    };

    // Options = seed ∪ values already used in saved beans (living list)
    function optionsFor(field, seed) {
      const set = new Set(seed);
      getBeans().forEach(b => { const v = (b[field] || '').trim(); if (v) set.add(v); });
      return [...set].sort((a, b) => a.localeCompare(b));
    }
    // Custom autocomplete dropdown anchored under the field (replaces <datalist>,
    // whose native popup mispositioned in embedded webviews). Free text still allowed.
    function attachAutocomplete(input, getOptions) {
      const wrap = input.closest('.ac');
      const list = document.createElement('div');
      list.className = 'ac-list'; list.hidden = true;
      wrap.appendChild(list);
      let active = -1;
      const items = () => [...list.querySelectorAll('.ac-item')];
      const hide = () => { list.hidden = true; };
      function show() {
        const q = input.value.trim().toLowerCase();
        const opts = getOptions().filter(o => o.toLowerCase().includes(q)).slice(0, 40);
        list.innerHTML = ''; active = -1;
        opts.forEach(o => {
          const el = document.createElement('div');
          el.className = 'ac-item'; el.textContent = o;
          el.addEventListener('mousedown', e => { e.preventDefault(); input.value = o; hide(); });
          list.appendChild(el);
        });
        list.hidden = opts.length === 0;
      }
      input.addEventListener('focus', show);
      input.addEventListener('input', show);
      input.addEventListener('blur', () => setTimeout(hide, 150));
      input.addEventListener('keydown', e => {
        const it = items();
        if (list.hidden || !it.length) return;
        if (e.key === 'ArrowDown') { e.preventDefault(); active = Math.min(active + 1, it.length - 1); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); active = Math.max(active - 1, 0); }
        else if (e.key === 'Enter' && active >= 0) { e.preventDefault(); input.value = it[active].textContent; hide(); return; }
        else if (e.key === 'Escape') { hide(); return; }
        else return;
        it.forEach((el, i) => el.classList.toggle('active', i === active));
        it[active].scrollIntoView({ block: 'nearest' });
      });
    }

    // Process "Other…" reveals a free-text field
    $('bean-process').addEventListener('change', e => {
      $('process-other-row').hidden = e.target.value !== '__other';
    });

    function collectBean() {
      let process = $('bean-process').value;
      if (process === '__other') process = $('bean-process-other').value.trim();
      return {
        id: nextBeanId(),
        savedAt: new Date().toISOString(),
        name: $('bean-name').value.trim(),
        roaster: $('bean-roaster').value.trim(),
        country: $('bean-country').value.trim(),
        region: $('bean-region').value.trim(),
        process,
        varietal: $('bean-varietal').value.trim(),
        roastDate: $('bean-roast').value,           // yyyy-mm-dd
        roasterNotes: $('bean-rnotes').value.trim(),
        myNotes: $('bean-mynotes').value.trim()
      };
    }

    function clearBeanForm() {
      ['bean-name','bean-roaster','bean-country','bean-region','bean-varietal',
       'bean-roast','bean-rnotes','bean-mynotes','bean-process-other']
        .forEach(id => $(id).value = '');
      $('bean-process').value = '';
      $('process-other-row').hidden = true;
    }

    function saveBean() {
      const bean = collectBean();
      if (!bean.name) { alert('Add a bean name first.'); return null; }
      const beans = getBeans();
      beans.push(bean);
      setBeans(beans);
      clearBeanForm();
      return bean;
    }
    $('btn-save-bean').addEventListener('click', () => {
      if (!saveBean()) return;
      const btn = $('btn-save-bean');
      btn.textContent = 'saved ✓';
      btn.classList.add('saved');
      setTimeout(() => { btn.textContent = 'save bean'; btn.classList.remove('saved'); }, 1400);
    });

    // ── Selected coffee (links a brew to a bean) ─────────────────
    let currentBean = null;
    const composeName = b => [b.roaster, b.name].map(x => (x || '').trim()).filter(Boolean).join(' ') || 'Untitled coffee';
    function setBeanBar(bean) {
      currentBean = bean || null;
      const bar = $('bean-bar');
      if (currentBean) {
        $('bb-name').textContent = composeName(currentBean);
        $('bb-roast').textContent = currentBean.roastDate ? 'roast ' + fmtDateShort(currentBean.roastDate) : '';
        bar.classList.add('has-bean');
      } else {
        $('bb-name').textContent = 'Select a coffee';
        $('bb-roast').textContent = '';
        bar.classList.remove('has-bean');
      }
    }
    function selectBean(bean) {
      setBeanBar(bean);
      closeHistory();
      showScreen('brew');
    }
    // Tap the coffee bar → pick from saved beans
    function openBeanPicker() {
      shownData = 'beans';
      $('history-title').textContent = 'Choose coffee';
      renderBeanHistory('pick');
      $('history-overlay').classList.add('open');
    }
    $('bean-bar').addEventListener('click', openBeanPicker);

    function fmtDateShort(ymd) {
      const dt = new Date(ymd + 'T00:00:00');
      return isNaN(dt) ? ymd
        : dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    // mode: 'browse' (history — expand, brew-this, demoted delete) | 'pick' (tap to select)
    function renderBeanHistory(mode = 'browse') {
      const list = $('history-list');
      const beans = getBeans().sort((a, b) => b.id - a.id);
      list.innerHTML = '';
      if (!beans.length) {
        list.innerHTML = '<div class="history-empty">No saved beans yet.</div>';
        return;
      }
      beans.forEach(b => {
        const card = document.createElement('div');
        card.className = 'brew-card';
        const roast = b.roastDate ? fmtDateShort(b.roastDate) : '—';
        card.innerHTML = `
          <div class="bc-top">
            <span class="bc-name"></span>
            <span class="bc-date"></span>
          </div>
          <div class="bc-stats"></div>
          <div class="bc-detail">
            <div class="bc-grid">
              <div class="row"><span class="k">Roaster</span><span class="v v-roaster"></span></div>
              <div class="row"><span class="k">Country</span><span class="v v-country"></span></div>
              <div class="row"><span class="k">Region</span><span class="v v-region"></span></div>
              <div class="row"><span class="k">Process</span><span class="v v-process"></span></div>
              <div class="row"><span class="k">Varietal</span><span class="v v-varietal"></span></div>
              <div class="row"><span class="k">Roast</span><span>${roast}</span></div>
            </div>
            <div class="bc-notes" hidden></div>
            <div class="bc-actions"><button class="bc-brew">brew this</button></div>
            <button class="bc-delete-link">delete bean</button>
          </div>`;
        card.querySelector('.bc-name').textContent = b.name || 'Untitled bean';
        card.querySelector('.bc-date').textContent = 'roast ' + roast;
        card.querySelector('.bc-stats').textContent =
          [b.roaster, [b.country, b.process].filter(Boolean).join(' · ')]
            .filter(Boolean).join(' · ') || '—';
        card.querySelector('.v-roaster').textContent = b.roaster || '—';
        card.querySelector('.v-country').textContent = b.country || '—';
        card.querySelector('.v-region').textContent = b.region || '—';
        card.querySelector('.v-process').textContent = b.process || '—';
        card.querySelector('.v-varietal').textContent = b.varietal || '—';
        if (b.roasterNotes) {
          const n = card.querySelector('.bc-notes');
          n.textContent = b.roasterNotes;
          n.hidden = false;
        }

        if (mode === 'pick') {
          // Whole card selects this coffee; no expand, no delete
          card.querySelector('.bc-actions').remove();
          card.querySelector('.bc-delete-link').remove();
          card.addEventListener('click', () => selectBean(b));
        } else {
          card.addEventListener('click', e => {
            if (e.target.closest('.bc-actions') || e.target.closest('.bc-delete-link')) return;
            card.classList.toggle('expanded');
          });
          card.querySelector('.bc-brew').addEventListener('click', () => selectBean(b));
          card.querySelector('.bc-delete-link').addEventListener('click', () => {
            if (!confirm('Delete this bean permanently? This is rarely needed and cannot be undone.')) return;
            setBeans(getBeans().filter(x => x.id !== b.id));
            renderBeanHistory('browse');
          });
        }
        list.appendChild(card);
      });
    }

    // ── Service worker (offline + installable; no-op on insecure origins) ──
    // Self-updating: a new SW skipWaiting()s + claims clients → 'controllerchange'
    // fires → we reload once to show the latest version. We also re-check for a
    // new SW whenever the app regains focus, so reopening it pulls updates.
    if ('serviceWorker' in navigator) {
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => {
          reg.update();
          document.addEventListener('visibilitychange', () => {
            if (!document.hidden) reg.update();
          });
        }).catch(() => {});
      });
    }

    // ── Init ─────────────────────────────────────────────────────
    attachAutocomplete($('bean-country'), () => optionsFor('country', SEED.country));
    attachAutocomplete($('bean-roaster'), () => optionsFor('roaster', SEED.roaster));
    attachAutocomplete($('bean-varietal'), () => optionsFor('varietal', SEED.varietal));
    setBeanBar(null);
    showScreen('brew');
    syncAgitate();
    // Notes textarea auto-grows with content
    $('notes').addEventListener('input', growNotes);
    growNotes();
    setTimerLabel('start');   // paint the ▶ status icon
    recalcSchedule();
    render(0);
    requestAnimationFrame(tick);
  </script>
</body>
</html>
